<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cugiblox · 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0b1020;color:#fff;font-family:'Trebuchet MS','Segoe UI',sans-serif;overflow:hidden;}
  #scene{position:fixed;inset:0;display:block;}
  .screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;z-index:10;background:radial-gradient(120% 120% at 50% 0%,rgba(40,30,80,.55),rgba(8,12,28,.92));}
  .screen.on{display:flex;}
  #s_title{justify-content:space-between;padding:8vh 24px 12vh;
    background:linear-gradient(to bottom,rgba(8,12,28,.78) 0%,rgba(8,12,28,0) 32%,rgba(8,12,28,0) 60%,rgba(8,12,28,.85) 100%);}
  #s_title h1{margin-top:2vh;}
  h1{font-size:min(8vw,46px);letter-spacing:1px;text-shadow:0 4px 18px rgba(0,0,0,.6);}
  h2{font-size:min(6vw,30px);margin-bottom:18px;}
  .sub{color:#ffd86b;margin:6px 0 20px;font-size:min(4.5vw,20px);}
  .grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:760px;}
  .card{width:140px;border-radius:16px;padding:12px 10px;cursor:pointer;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);transition:.15s;}
  .card:hover,.card.sel{background:rgba(255,216,107,.2);border-color:#ffd86b;transform:translateY(-3px);}
  .card .avt{width:104px;height:132px;display:block;margin:0 auto 4px;object-fit:contain;background:radial-gradient(60% 60% at 50% 40%,rgba(255,255,255,.18),rgba(255,255,255,0));border-radius:12px;}
  .card .nm{font-weight:bold;font-size:16px;} .card .ag{font-size:12px;color:#cdd;}
  button.go{margin-top:24px;padding:14px 34px;font-size:20px;font-weight:bold;border:none;border-radius:30px;background:linear-gradient(#ffd86b,#ffb43c);color:#3a2400;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  button.go:active{transform:scale(.96);}
  .small{font-size:13px;color:rgba(255,255,255,.6);margin-top:14px;}
  #mapWrap{position:relative;display:inline-block;}
  #italyImg{width:min(78vw,360px);height:auto;border-radius:12px;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));}
  .mkb{position:absolute;transform:translate(-50%,-50%);background:#ffd86b;color:#3a2400;font-weight:bold;border:2px solid #fff;border-radius:16px;padding:4px 10px;font-size:13px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.45);white-space:nowrap;}
  .mkb::before{content:'📍';margin-right:3px;}
  .mkb:hover,.mkb.sel{background:#ff6b6b;color:#fff;transform:translate(-50%,-50%) scale(1.08);}
  #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:8;} #hud.on{display:block;}
  #score{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);padding:8px 18px;border-radius:20px;font-weight:bold;font-size:17px;text-align:center;}
  #instr{position:absolute;top:58px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.35);padding:6px 14px;border-radius:14px;font-size:14px;color:#ffe;text-align:center;max-width:90vw;}
  #powerwrap{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);width:240px;height:18px;background:rgba(0,0,0,.5);border-radius:10px;overflow:hidden;display:none;}
  #powerwrap.on{display:block;} #power{height:100%;width:0%;background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c);}
  #msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:min(7vw,34px);font-weight:bold;color:#ffd86b;text-shadow:0 4px 14px #000;text-align:center;display:none;}
  #back{position:absolute;top:12px;right:12px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:#fff;font-size:20px;pointer-events:auto;}
  #pad{position:fixed;inset:0;z-index:9;display:none;pointer-events:none;} #pad.on{display:block;}
  .tbtn{position:absolute;bottom:26px;width:78px;height:78px;border-radius:18px;border:4px solid #000;background:#2563c8;color:#fff;font-size:30px;font-weight:bold;pointer-events:auto;text-shadow:0 1px 2px #000;box-shadow:0 3px 8px rgba(0,0,0,.5);}
  .tbtn:active{background:#4f93ff;} #bL{left:24px;} #bR{left:114px;}
  #bA{right:28px;width:98px;height:98px;border-radius:50%;border:4px solid #000;background:#ffa028;color:#3a2400;font-weight:bold;font-size:17px;text-shadow:none;}
  #bU,#bD{right:28px;display:none;font-size:26px;background:#22b45a;color:#fff;}
  #bU{bottom:132px;} #bD{bottom:26px;}
  #pad.drive #bA{display:none;} #pad.drive #bU,#pad.drive #bD{display:block;}
  #pad.race #bU{display:block;}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#0b1020;z-index:50;text-align:center;padding:30px;}
  #results{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,12,28,.82);pointer-events:none;}
  #results.on{display:flex;}
  #results h3{font-size:min(7vw,30px);color:#ffd86b;margin-bottom:14px;text-shadow:0 3px 12px #000;}
  #results .row{display:flex;align-items:center;gap:12px;width:min(82vw,360px);padding:9px 14px;margin:4px 0;border-radius:12px;background:rgba(255,255,255,.08);font-size:18px;}
  #results .row.you{background:rgba(255,216,107,.25);border:2px solid #ffd86b;}
  #results .pos{width:36px;font-weight:bold;font-size:20px;text-align:center;}
  #results .nm{flex:1;text-align:left;}
  #results .pts{color:#9fe6c8;font-size:15px;margin-top:14px;}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="s_title" class="screen on">
  <h1>CUGIBLOX</h1>
  <button class="go" id="startBtn">▶ GIOCA</button>
</div>

<div id="s_char" class="screen">
  <h2>Chi gioca?</h2>
  <div id="charGrid" class="grid"></div>
  <button class="go" id="charNext">Avanti ▶</button>
</div>

<div id="s_map" class="screen">
  <h2>Scegli la città</h2>
  <div class="sub">Tocca una città sulla cartina</div>
  <div id="mapWrap">
    <img id="italyImg" src="italia.jpg" alt="Italia">
    <button class="mkb" data-city="roma"   style="left:57%;top:51%">Roma</button>
    <button class="mkb" data-city="matera" style="left:72%;top:63%">Matera</button>
    <button class="mkb" data-city="rossano" style="left:76%;top:74%">Rossano</button>
  </div>
  <button class="go" id="mapBack" style="background:rgba(255,255,255,.15);color:#fff">◀ Cambia personaggio</button>
</div>

<div id="hud">
  <div id="score">0</div><div id="instr"></div>
  <div id="powerwrap"><div id="power"></div></div>
  <div id="msg"></div><button id="back">✕</button>
</div>

<div id="pad">
  <button class="tbtn" id="bL">◀</button>
  <button class="tbtn" id="bR">▶</button>
  <button class="tbtn" id="bA">AZIONE</button>
  <button class="tbtn" id="bU">▲</button>
  <button class="tbtn" id="bD">▼</button>
</div>

<div id="err"><h2>3D non disponibile</h2><p style="margin-top:12px;color:#bcd">Non è stato possibile caricare la libreria 3D (Three.js).<br>Serve una connessione internet per la versione 3D.</p></div>

<div id="results"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
if (typeof THREE === 'undefined'){ document.getElementById('err').style.display='flex'; }
else { startApp(); }

function startApp(){
/* ===================== DATI ===================== */
const CHARS = {
  giorgia:{name:'Giorgia',age:10,skin:0xf3cda9,hair:0xc79655,style:'long',  shirt:0xf7f7f7,pants:0x4a6fa5},
  babbo:  {name:'Babbo',  age:30,skin:0xe8b894,hair:0x52443a,style:'adult', shirt:0x5a6b85,pants:0x6a8fc0,beard:true},
  letizia:{name:'Letizia',age:12,skin:0xf6d6b8,hair:0xb8895a,style:'long',  shirt:0xff9ec4,pants:0xd56fa0},
  eleonora:{name:'Eleonora',age:10,skin:0xf3cda9,hair:0xc79a5b,style:'long',shirt:0xb07cd6,pants:0x5b4a8a},
  corrado:{name:'Corrado',age:8, skin:0xf0c9a8,hair:0x8a5a30,style:'curly', shirt:0x4cae58,pants:0x3a6fa0},
  giulio: {name:'Giulio', age:6, skin:0xf0c9a8,hair:0x4a3526,style:'buzz',  shirt:0xffce3a,pants:0x444444},
};
const CHAR_IDS = ['letizia','giorgia','eleonora','corrado','giulio','babbo'];
const CITIES = {
  roma:   {name:'Roma',   sky:0x9fd0ff, ground:0x6fae5a, accent:0xd9a441},
  rossano:{name:'Rossano',sky:0x8fd8ff, ground:0xead7a0, accent:0x37b6c9},
  matera: {name:'Matera', sky:0xf3e3c8, ground:0xc9ad86, accent:0xb5651d},
};
const CITY_GAMES = {
  roma:    ['bowling','scuola','casa','parco','danza','piscina','color_hotel','guida','moto','bici','pattinaggio'],
  matera:  ['cavallo','scuola','parco','tennis','bar','casa','parco_avventure','calcio','basket','piscina'],
  rossano: ['mare','piscina','acquapark','pesca','giostre','bar','bici','piazzetta','gavettoni','ristorante'],
};
const META = {
  colosseo:{e:'🏟️',n:'Colosseo'}, scuola:{e:'🏫',n:'Scuola'}, casa:{e:'🏠',n:'Casa'}, parco:{e:'🌳',n:'Parco'},
  danza:{e:'💃',n:'Danza'}, piscina:{e:'🏊',n:'Piscina'}, color_hotel:{e:'🏨',n:'Color Hotel'}, guida:{e:'🚗',n:'Scuola Guida'},
  moto:{e:'🏍️',n:'Moto'}, bici:{e:'🚲',n:'Bici'}, cavallo:{e:'🐴',n:'Cavallo'}, tennis:{e:'🎾',n:'Tennis'},
  bar:{e:'🍹',n:'Bar'}, parco_avventure:{e:'🧗',n:'Parco Avventure'}, calcio:{e:'⚽',n:'Calcio'}, basket:{e:'🏀',n:'Basket'},
  mare:{e:'🏖️',n:'Mare'}, acquapark:{e:'🎢',n:'Acquapark'}, pesca:{e:'🎣',n:'Pesca'}, giostre:{e:'🎠',n:'Giostre'},
  piazzetta:{e:'⛲',n:'Piazzetta'}, gavettoni:{e:'🎈',n:'Gavettoni'}, ristorante:{e:'🍝',n:'Ristorante'}, bowling:{e:'🎳',n:'Bowling'}, pattinaggio:{e:'⛸️',n:'Pattinaggio'},
};
let hero='giorgia', city='roma', mode='hub';
let total = parseInt(localStorage.getItem('cugini3d_total')||'0',10);
function otherChar(){ return CHAR_IDS.find(i=>i!==hero)||'babbo'; }

/* ===================== INPUT ===================== */
const keys={}, just={};
addEventListener('keydown',e=>{ const k=norm(e.key); if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault(); if(!keys[k])just[k]=true; keys[k]=true; });
addEventListener('keyup',e=>{ keys[norm(e.key)]=false; });
function norm(k){ if(k===' ')return'Space'; if(k==='a'||k==='A')return'ArrowLeft'; if(k==='d'||k==='D')return'ArrowRight'; if(k==='w'||k==='W')return'ArrowUp'; if(k==='s'||k==='S')return'ArrowDown'; return k; }
function hit(k){ return !!just[k]; }
function clearJust(){ for(const k in just) just[k]=false; }
function bindTouch(id,key){ const b=document.getElementById(id);
  const d=e=>{e.preventDefault(); if(!keys[key])just[key]=true; keys[key]=true;}; const u=e=>{e.preventDefault(); keys[key]=false;};
  b.addEventListener('touchstart',d); b.addEventListener('touchend',u); b.addEventListener('mousedown',d); b.addEventListener('mouseup',u); }
bindTouch('bL','ArrowLeft'); bindTouch('bR','ArrowRight'); bindTouch('bA','Space'); bindTouch('bU','ArrowUp'); bindTouch('bD','ArrowDown');
function setPad(mode){ const p=document.getElementById('pad'); p.classList.remove('drive','race'); if(mode)p.classList.add(mode); }
const isTouch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
let AC=null;
function beep(f=440,d=.08,t='square',v=.05){ try{ if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain(); o.type=t;o.frequency.value=f;g.gain.value=v; o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.stop(AC.currentTime+d);}catch(e){} }
let musicTimer=null;
function startMusic(){ stopMusic(); if(!AC)return; const mel=[262,330,392,330,294,247,294,392,262,392,440,392]; let i=0;
  musicTimer=setInterval(()=>{ try{ if(!AC)return; const f=mel[i%mel.length]; i++; const o=AC.createOscillator(),g=AC.createGain(); o.type='triangle'; o.frequency.value=f; g.gain.value=0.0001; o.connect(g); g.connect(AC.destination); const tn=AC.currentTime; g.gain.exponentialRampToValueAtTime(0.05,tn+0.02); g.gain.exponentialRampToValueAtTime(0.0001,tn+0.3); o.start(tn); o.stop(tn+0.32); }catch(e){} },320); }
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }
function makeTreat(kind){ const g=new THREE.Group();
  if(kind==='gelato'){ const cone=new THREE.Mesh(new THREE.ConeGeometry(.07,.18,8),M(0xd9a05a)); cone.rotation.x=Math.PI; const s1=new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),M(0xff9ec4)); s1.position.y=.12; g.add(cone,s1); }
  else if(kind==='patatine'){ const box=new THREE.Mesh(new THREE.BoxGeometry(.12,.16,.08),M(0xe04030)); for(let i=0;i<4;i++){ const fr=new THREE.Mesh(new THREE.BoxGeometry(.02,.14,.02),M(0xffd24a)); fr.position.set(-.04+i*.025,.12,0); g.add(fr);} g.add(box); }
  else if(kind==='caffe'){ g.add(new THREE.Mesh(new THREE.CylinderGeometry(.06,.05,.09,10),M(0xffffff))); }
  else if(kind==='yogurt'){ g.add(new THREE.Mesh(new THREE.CylinderGeometry(.06,.05,.12,10),M(0xf2e9d0))); }
  else if(kind==='cornetto'){ g.add(new THREE.Mesh(new THREE.TorusGeometry(.07,.03,8,12,Math.PI*1.2),M(0xd9a05a))); }
  else { const gl=new THREE.Mesh(new THREE.CylinderGeometry(.07,.03,.14,10),M(0xff6b6b,.4)); const um=new THREE.Mesh(new THREE.ConeGeometry(.06,.03,8),M(0x6bd0ff)); um.position.y=.1; g.add(gl,um); }
  return g; }

/* ===================== THREE ===================== */
const canvas=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5)); renderer.shadowMap.enabled=false;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,1,0.1,400);
const clock=new THREE.Clock();
const world=new THREE.Group(); scene.add(world);
scene.add(new THREE.AmbientLight(0xffffff,0.66));
const sun=new THREE.DirectionalLight(0xffffff,0.9); sun.position.set(10,22,12); sun.castShadow=true; sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-30;sun.shadow.camera.right=30;sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;sun.shadow.camera.near=1;sun.shadow.camera.far=90; scene.add(sun);
function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();
const M=(c,r=0.85)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:0.04});
function applyTheme(){ const c=CITIES[city]; scene.background=new THREE.Color(c.sky); scene.fog=new THREE.Fog(c.sky,55,180); }
function clearWorld(){ stopMusic(); for(let i=world.children.length-1;i>=0;i--){ const o=world.children[i];
  o.traverse(n=>{ if(n.geometry)n.geometry.dispose(); if(n.material){(Array.isArray(n.material)?n.material:[n.material]).forEach(m=>{ if(m.map&&!m.map.__keep)m.map.dispose(); m.dispose&&m.dispose(); });} }); world.remove(o); } }
function addGround2(col){ const g=new THREE.Mesh(new THREE.PlaneGeometry(500,500),M(col,.95)); g.rotation.x=-Math.PI/2; g.receiveShadow=true; world.add(g); return g; }
function skyTexture(top,bot){ const c=document.createElement('canvas'); c.width=16;c.height=160; const x=c.getContext('2d'); const g=x.createLinearGradient(0,0,0,160); g.addColorStop(0,top); g.addColorStop(.55,bot); g.addColorStop(1,'#ffffff'); x.fillStyle=g; x.fillRect(0,0,16,160); return new THREE.CanvasTexture(c); }
function cloudTexture(){ const c=document.createElement('canvas'); c.width=128;c.height=64; const x=c.getContext('2d'); x.clearRect(0,0,128,64); x.fillStyle='rgba(255,255,255,.92)'; for(let i=0;i<6;i++){ x.beginPath(); x.arc(18+i*17,42-Math.random()*16,15+Math.random()*9,0,Math.PI*2); x.fill(); } return new THREE.CanvasTexture(c); }
function addSky(){ const c=CITIES[city]; const base=new THREE.Color(c.sky);
  const top='#'+base.clone().multiplyScalar(0.55).getHexString(), bot='#'+base.getHexString();
  const sky=new THREE.Mesh(new THREE.SphereGeometry(190,24,16),new THREE.MeshBasicMaterial({map:skyTexture(top,bot),side:THREE.BackSide,fog:false})); world.add(sky);
  const clouds=[]; for(let i=0;i<5;i++){ const cl=new THREE.Sprite(new THREE.SpriteMaterial({map:cloudTexture(),transparent:true,opacity:.92,depthWrite:false,fog:false})); cl.position.set(rand(-90,90),rand(30,48),rand(-90,90)); cl.scale.set(rand(16,26),rand(8,12),1); world.add(cl); clouds.push(cl); }
  return clouds; }
function groundTexture(city){ const c=document.createElement('canvas'); c.width=128;c.height=128; const x=c.getContext('2d');
  if(city==='roma'){ x.fillStyle='#5fa048'; x.fillRect(0,0,128,128); for(let i=0;i<500;i++){ x.fillStyle='rgba('+(40+Math.random()*40|0)+','+(120+Math.random()*50|0)+','+(50+Math.random()*40|0)+',.6)'; x.fillRect(Math.random()*128,Math.random()*128,2,3); } }
  else if(city==='rossano'){ x.fillStyle='#e6cf9a'; x.fillRect(0,0,128,128); x.strokeStyle='rgba(205,182,135,.6)'; x.lineWidth=2; for(let i=0;i<22;i++){ x.beginPath(); x.moveTo(0,i*6); x.bezierCurveTo(40,i*6+4,90,i*6-4,128,i*6); x.stroke(); } }
  else { x.fillStyle='#c9ad86'; x.fillRect(0,0,128,128); x.strokeStyle='rgba(120,100,70,.55)'; x.lineWidth=2; for(let j=0;j<8;j++)for(let i=0;i<8;i++) x.strokeRect(i*16+(j%2?8:0),j*16,16,16); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(50,50); return t; }
function addGroundTex(city){ const m=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({map:groundTexture(city),roughness:.95})); m.rotation.x=-Math.PI/2; m.receiveShadow=true; world.add(m); return m; }
function B(w,h,d,c,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M(c)); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; world.add(m); return m; }
function rand(a,b){ return a+Math.random()*(b-a); }
let shakeT=0; function shake(){ shakeT=0.3; }

/* ===================== PERSONAGGIO (con viso) ===================== */
let suppressName=false; const NAME_TEX={};
function nameSprite(text){ let t=NAME_TEX[text]; if(!t){ const c=document.createElement('canvas'); c.width=256; c.height=64; const x=c.getContext('2d');
    x.fillStyle='rgba(0,0,0,.5)'; x.fillRect(6,12,244,40); x.fillStyle='#ffffff'; x.font='bold 30px Trebuchet MS, sans-serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(text,128,33);
    t=new THREE.CanvasTexture(c); t.__keep=true; NAME_TEX[text]=t; }
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false})); s.renderOrder=10; return s; }
function buildCousin(id){
  const cfg=CHARS[id]; const g=new THREE.Group();
  const sk=M(cfg.skin), sh=M(cfg.shirt,.7), pa=M(cfg.pants), ha=M(cfg.hair,.95);
  const legGeo=new THREE.BoxGeometry(.18,.5,.18);
  const l1=new THREE.Mesh(legGeo,pa); l1.position.set(-.11,.25,0); const l2=l1.clone(); l2.position.x=.11;
  const torso=new THREE.Mesh(new THREE.BoxGeometry(.5,.6,.28),sh); torso.position.y=.8;
  const armGeo=new THREE.BoxGeometry(.12,.5,.12);
  const a1=new THREE.Mesh(armGeo,sk); a1.position.set(-.31,.82,0); const a2=a1.clone(); a2.position.x=.31;
  const head=new THREE.Mesh(new THREE.SphereGeometry(.22,18,18),sk); head.position.y=1.28;
  g.add(l1,l2,torso,a1,a2,head);
  // VISO morbido color carne: occhietti scuri con luce, nasino, sorriso, guance rosa
  const eyeM=M(0x4a3328,.35);
  [-1,1].forEach(s=>{ const eye=new THREE.Mesh(new THREE.SphereGeometry(.045,12,12),eyeM); eye.scale.set(1,1.25,.55); eye.position.set(.082*s,1.31,.207); g.add(eye);
    const glint=new THREE.Mesh(new THREE.SphereGeometry(.014,6,6),M(0xffffff,.2)); glint.position.set(.092*s,1.335,.235); g.add(glint); });
  const nose=new THREE.Mesh(new THREE.SphereGeometry(.03,8,8),M(cfg.skin,.6)); nose.scale.set(1,.8,1.2); nose.position.set(0,1.265,.232); g.add(nose);

function treeMesh(){ const g=new THREE.Group(); const tr=new THREE.Mesh(new THREE.CylinderGeometry(.18,.22,1.2,8),M(0x7a4a28)); tr.position.y=.6; const lv=new THREE.Mesh(new THREE.ConeGeometry(1,2,9),M(0x2f8f4a)); lv.position.y=2; g.add(tr,lv); g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); return g; }
function palmMesh(){ const g=new THREE.Group(); const tr=new THREE.Mesh(new THREE.CylinderGeometry(.16,.2,2.4,8),M(0x9c6b3f)); tr.position.y=1.2; const lv=new THREE.Mesh(new THREE.ConeGeometry(1.2,.6,7),M(0x2f8f4a)); lv.position.y=2.4; g.add(tr,lv); g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); return g; }
function DriveGame(opts){
  applyTheme(); const terrain=opts.terrain||'road', slide=terrain==='slide', bike=terrain==='bike';
  let coins=0; const ROADW=9, MAXS=opts.maxspeed||36, GOAL=opts.goal||650, LANEX=ROADW/2-1.2;

  if(!bike){ [[-ROADW/2],[ROADW/2]].forEach(([x])=>{ B(.25,slide?.5:.05,500, slide?0x2ecc71:0xf0f0f0, x, slide?.25:.03, 0); }); }
  const veh=makeVehicle(opts.veh); const wheels=veh.userData.wheels; veh.position.set(0,0,6); veh.rotation.y=Math.PI; world.add(veh);
  const stripes=[]; if(!slide) for(let i=0;i<20;i++){ stripes.push(B(.3,.02,2, bike?0xe8d8b0:0xffd54a, 0,.06,-i*6)); }
  const scenery=[]; for(let i=0;i<22;i++){ const t=slide?palmMesh():treeMesh(); t.position.set((i%2?1:-1)*(ROADW/2+2+rand(0,3)),0,-i*5-rand(0,4)); world.add(t); scenery.push(t); }
  if(slide){ for(let i=0;i<4;i++){ const flume=new THREE.Mesh(new THREE.TorusGeometry(4,.6,8,16,Math.PI),M([0x6bd0ff,0xff6b6b,0xffd24a,0x9bff5b][i],.4)); flume.position.set((i%2?1:-1)*13,3.2,-15-i*16); flume.rotation.set(Math.PI/2,0,.35); world.add(flume); const sup=cyl(.2,.2,3.4,0xcfd6da); sup.position.set((i%2?1:-1)*13,1.6,-15-i*16); world.add(sup); } }
  const haz=[], money=[]; const COL=[0x2980b9,0x27ae60,0xf1c40f,0x8e44ad,0xe67e22,0xecf0f1];
  let dist=0, speed=slide?20:16, spawn=0, cspawn=0, crashT=0, passed=0, won=false, tt=0, kamNext=130, kamT=0;
  const race=!!opts.race; const opps=race?makeOpponents(3,(rid)=>makeVehicle(opts.veh,rid),MAXS*0.72,8):[]; opps.forEach(o=>o.lane=[-LANEX,LANEX,0][o.idx%3]);
  setInstr(bike?'◀ ▶ pedala ed evita alberi, sassi e ostacoli! 🚲':slide?'◀ ▶ guida sullo scivolo, prendi le ciambelle 🛟':race?'◀▶ sterza · ▲ accelera · ▼ frena · batti gli avversari! 🏍️':'◀ ▶ sterza · supera/schiva · 🪙 = punti');
  camera.position.set(0,4.2,12); camera.lookAt(0,1,0);
  function coin(){ const m=new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.08,18),M(0xffd700,.3)); m.rotation.x=Math.PI/2; m.castShadow=true; return m; }
  function ringFloat(){ const m=new THREE.Mesh(new THREE.TorusGeometry(.4,.14,8,16),M([0xff6b6b,0x6bd0ff,0xffd24a][Math.floor(Math.random()*3)],.4)); m.castShadow=true; return m; }
  function rock(){ const g=new THREE.Group(); const r=new THREE.Mesh(new THREE.DodecahedronGeometry(.6),M(0x7d8a99,.9)); r.position.y=.5; g.add(r); g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); g.userData.own=0; return g; }
  function bikeObs(){ let g; const r=Math.random();
    if(r<.4){ g=treeMesh(); } else if(r<.68){ g=new THREE.Group(); const s=new THREE.Mesh(new THREE.DodecahedronGeometry(.5),M(0x8a8f99,.9)); s.position.y=.4; g.add(s); }
    else if(r<.85){ g=new THREE.Group(); const p=new THREE.Mesh(new THREE.BoxGeometry(.6,.04,.5),M([0xffffff,0xffe14a,0xff8a5b][Math.floor(Math.random()*3)],.6)); p.position.y=.06; p.rotation.z=rand(-.3,.3); g.add(p); }
    else { g=new THREE.Group(); const c=new THREE.Mesh(new THREE.ConeGeometry(.35,.8,12),M(0xff7733,.5)); c.position.y=.4; g.add(c); }
    g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); g.userData.own=0; return g; }
  return { update(dt){ if(won)return; tt+=dt;
    let cruise=(slide?20:16)+dist*0.02;
    if(race){ cruise=(keys['ArrowUp']||keys['Space'])?MAXS:MAXS*0.78; if(keys['ArrowDown'])cruise=MAXS*0.45; }
    if(slide){ if(dist>=kamNext){ kamNext+=rand(120,180); kamT=2.3; beep(1000,.18); showMsg('🌀 KAMIKAZE!'); } if(kamT>0){ kamT-=dt; cruise*=1.7; if(kamT<=0)showMsg(''); } }
    const cap=MAXS*((slide&&kamT>0)?1.6:1);
    speed += (Math.min(cap,cruise)-speed)*Math.min(1,dt*1.6); dist+=speed*dt;
    const lv=race?7:slide?12:speed*0.9;   // moto: sterzata piu dolce
    const tx=veh.position.x+((keys['ArrowLeft']?-1:0)+(keys['ArrowRight']?1:0))*lv*dt;
    veh.position.x=THREE.MathUtils.clamp(tx,-LANEX,LANEX);
    veh.rotation.z=THREE.MathUtils.lerp(veh.rotation.z,(keys['ArrowLeft']?0.12:0)+(keys['ArrowRight']?-0.12:0),0.2);

    scenery.forEach(t=>{ t.position.z+=speed*dt; if(t.position.z>14){ t.position.z-=120; t.position.x=(Math.random()<.5?-1:1)*(ROADW/2+2+rand(0,3)); } });
    spawn-=dt; if(spawn<=0){ spawn=Math.max(.7,1.6-dist*0.0008); const o=slide?rock():bike?bikeObs():makeCar(COL[Math.floor(Math.random()*COL.length)]);
      o.position.set([-LANEX,0,LANEX][Math.floor(Math.random()*3)],0,-80); o.userData.own=(slide||bike)?0:speed*0.45; o.userData.scored=false; world.add(o); haz.push(o); }
    for(let i=haz.length-1;i>=0;i--){ const o=haz[i]; o.position.z+=(speed-o.userData.own)*dt; if(o.userData.wheels)o.userData.wheels.forEach(w=>w.rotation.x-=o.userData.own*dt);
      if(crashT<=0 && Math.abs(o.position.z-veh.position.z)<2 && Math.abs(o.position.x-veh.position.x)<1.1){ crashT=0.9; beep(120,.25,'sawtooth',.08); dist=Math.max(0,dist-22); shake(); }
      if(!slide && !bike && !o.userData.scored && o.position.z>veh.position.z+1){ o.userData.scored=true; passed++; beep(660,.06); }
      if(o.position.z>16){ world.remove(o); haz.splice(i,1); } }
    cspawn-=dt; if(cspawn<=0){ cspawn=rand(.7,1.4); const cn=slide?ringFloat():coin(); cn.position.set(rand(-LANEX,LANEX),slide?.5:.8,-80); world.add(cn); money.push(cn); }
    for(let i=money.length-1;i>=0;i--){ const cn=money[i]; cn.position.z+=speed*dt; cn.rotation.y+=dt*4;
      if(Math.abs(cn.position.z-veh.position.z)<1.2 && Math.abs(cn.position.x-veh.position.x)<1){ coins++; beep(900,.07); world.remove(cn); money.splice(i,1); continue; }
      if(cn.position.z>16){ world.remove(cn); money.splice(i,1); } }
    if(crashT>0)crashT-=dt;
    if(race){ stepOpponents(opps,dt,tt); opps.forEach(o=>{ const rel=o.od-dist, vis=rel>-9 && rel<90; o.m.visible=vis; if(vis){ o.m.position.set(o.lane,0,6-rel); o.m.userData.wheels.forEach(w=>w.rotation.x-=o.sp*dt); } }); }
    const pos=race?rankAhead(opps,dist):1;
    setScore((slide?'🛟 ':'🪙 ')+coins+(race?('   ·   '+pos+'º'):(bike||slide?'':('   ·   superate: '+passed)))+'   ·   '+Math.floor(dist)+'m / '+GOAL);
    camera.position.x=THREE.MathUtils.lerp(camera.position.x,veh.position.x*0.5,0.1); if(slide)camera.position.y=THREE.MathUtils.lerp(camera.position.y,kamT>0?2.9:4.2,.08); camera.lookAt(veh.position.x*0.3,1,0);
    if(dist>=GOAL){ won=true; if(race){ const rows=[{n:CHARS[hero].name,you:1,p:dist}].concat(opps.map(o=>({n:CHARS[o.rid].name,p:o.od}))).sort((a,b)=>b.p-a.p); finishGame(placePts(pos),placeText(pos)+' 🏍️',rows); } else finishGame(20+coins+passed,'Traguardo! 🏁'); }
  }};
}

/* ===================== BICI: sentiero di montagna (curve, salite, discese, terra/fango/neve) ===================== */
function GameBiciMontagna(){
  applyTheme();
  const valley=addGround2(0x3f6e3a); valley.position.y=-7;     // fondovalle
  // montagne di sfondo
  for(let i=0;i<5;i++){ const mt=new THREE.Mesh(new THREE.ConeGeometry(rand(8,13),rand(12,20),6),M(0x6b7a6a,.95)); mt.position.set(rand(-40,40),2,-50-rand(0,20)); mt.castShadow=false; world.add(mt);
    const cap=new THREE.Mesh(new THREE.ConeGeometry(4,5,6),M(0xeef4f8,.8)); cap.position.set(mt.position.x,mt.position.y+ (mt.geometry.parameters.height/2)-2,mt.position.z); world.add(cap); }
  const SEG=2.2, N=46, HALF=3.0, GOAL=900;
  const cx=t=>6*Math.sin(t*0.016)+3.2*Math.sin(t*0.043+1.2);
  const hy=t=>2.4*Math.sin(t*0.011)+1.3*Math.sin(t*0.026+0.5);
  const terr=t=>Math.floor(t/45)%3;   // 0 terra, 1 fango, 2 neve
  const TCOL=[0x9c6b3a,0x5d4324,0xeaf2f7];
  const slices=[], trees=[];
  for(let i=0;i<N;i++){ const s=new THREE.Mesh(new THREE.BoxGeometry(HALF*2,.3,SEG+0.4),M(TCOL[0],.92)); s.receiveShadow=true; world.add(s); slices.push(s);
    const mkTree=()=>{ const g=new THREE.Group(); const tr=new THREE.Mesh(new THREE.CylinderGeometry(.2,.28,2.2,7),M(0x6b4423)); tr.position.y=1.1; const lv=new THREE.Mesh(new THREE.ConeGeometry(1,2.4,8),M(0x2f7a3a)); lv.position.y=2.8; g.add(tr,lv); g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); return g; };
    const tl=mkTree(), tr2=mkTree(); world.add(tl,tr2); trees.push([tl,tr2]); }
  // ostacoli radi e vari: sasso (raro), tronco, pozzanghera
  const obPool=[]; for(let i=0;i<4;i++){ const g=new THREE.Group();
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(.5),M(0x8a8f99,.9)); rock.position.y=.32;
    const log=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,2.2,10),M(0x6b4423)); log.rotation.z=Math.PI/2; log.position.y=.32;
    const pud=new THREE.Mesh(new THREE.CircleGeometry(.85,18),new THREE.MeshStandardMaterial({color:0x2f6f9a,transparent:true,opacity:.7,roughness:.2})); pud.rotation.x=-Math.PI/2; pud.position.y=.06;
    g.add(rock,log,pud); g.userData.parts={rock,log,pud}; g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); g.visible=false; world.add(g); obPool.push(g); }
  // schizzo pozzanghera
  const splash=new THREE.Mesh(new THREE.RingGeometry(.1,.5,16),new THREE.MeshStandardMaterial({color:0x9fd8ff,transparent:true,opacity:.8,side:THREE.DoubleSide})); splash.rotation.x=-Math.PI/2; splash.visible=false; world.add(splash); let splashT=0;
  const bike=makeVehicle('bici'); bike.position.set(0,.15,6); bike.rotation.y=Math.PI; world.add(bike);
  const opps=makeOpponents(3,(rid)=>{ const v=makeVehicle('bici',rid); v.rotation.y=Math.PI; return v; },12,7); opps.forEach(o=>o.lane=(o.idx-1)*1.7);
  let dist=0, bikeX=cx(0), speed=10, won=false, t=0, slip=0;
  setInstr('◀▶ segui il sentiero · batti gli avversari · AZIONE pedala in salita');
  camera.position.set(0,4.4,13);
  const names=['Terra','Fango','Neve'];
  return { update(dt){ if(won)return; t+=dt;
    const slope=hy(dist+3)-hy(dist), ter=terr(dist);
    let base=12-slope*2.4; if(ter===1)base=Math.min(base,8); if(keys['ArrowUp'])base+=4;
    speed+=(base-speed)*Math.min(1,dt*2); speed=Math.max(3,speed); dist+=speed*dt;
    const steerRate=ter===2?3.0:4.6;
    if(keys['ArrowLeft'])bikeX-=steerRate*dt; if(keys['ArrowRight'])bikeX+=steerRate*dt;
    if(ter===2){ slip+=Math.sin(dist*0.4)*dt*0.5; bikeX+=slip*dt; } else slip*=0.9;
    const center=cx(dist), off=bikeX-center, onTrail=Math.abs(off)<HALF;
    bikeX=THREE.MathUtils.clamp(bikeX,center-(HALF+3),center+(HALF+3));
    if(!onTrail){ speed*=Math.pow(.5,dt*2); shake(); }
    bike.rotation.z=THREE.MathUtils.lerp(bike.rotation.z,(keys['ArrowLeft']?0.18:0)+(keys['ArrowRight']?-0.18:0),0.2);
    bike.rotation.x=THREE.MathUtils.lerp(bike.rotation.x,-slope*0.18,0.1);
    bike.userData.wheels.forEach(w=>w.rotation.x-=speed*dt);
    const by=hy(dist);
    for(let i=0;i<N;i++){ const ti=dist+i*SEG, s=slices[i], tt=terr(ti);
      s.position.set(cx(ti)-bikeX, hy(ti)-by, 6-i*SEG); s.material.color.setHex(TCOL[tt]);
      const pr=trees[i], snowy=tt===2;
      pr[0].position.set(cx(ti)-bikeX-(HALF+1.4), hy(ti)-by, 6-i*SEG); pr[1].position.set(cx(ti)-bikeX+(HALF+1.4), hy(ti)-by, 6-i*SEG);
      pr[0].children[1].material.color.setHex(snowy?0xdfeaf0:0x2f7a3a); pr[1].children[1].material.color.setHex(snowy?0xdfeaf0:0x2f7a3a); }
    obPool.forEach(o=>{ if(o.userData.od===undefined || o.userData.od<dist-3){ o.userData.od=dist+rand(28,62); o.userData.ox=rand(-(HALF-0.8),HALF-0.8); o.userData.hit=false;
        const r=Math.random(); o.userData.kind=r<.2?'rock':r<.55?'log':'pud'; const P=o.userData.parts; P.rock.visible=o.userData.kind==='rock'; P.log.visible=o.userData.kind==='log'; P.pud.visible=o.userData.kind==='pud'; }
      const rel=o.userData.od-dist; if(rel<(N-2)*SEG){ o.visible=true; const wx=cx(o.userData.od)+o.userData.ox-bikeX; o.position.set(wx,(hy(o.userData.od)-by)+(o.userData.kind==='pud'?.02:.0),6-rel);
        if(rel<1.3 && rel>-0.6 && Math.abs(wx)<0.95 && !o.userData.hit){ o.userData.hit=true;
          if(o.userData.kind==='pud'){ speed*=0.8; beep(300,.12,'sine',.05); splash.position.set(0,.1,6); splash.visible=true; splashT=0.4; }
          else { speed=Math.max(3,speed*0.4); beep(120,.25,'sawtooth',.08); shake(); } } } else o.visible=false; });
    if(splashT>0){ splashT-=dt; const s=1+(0.4-splashT)*6; splash.scale.set(s,s,s); splash.material.opacity=Math.max(0,splashT*2); if(splashT<=0)splash.visible=false; }
    stepOpponents(opps,dt,t);
    opps.forEach(o=>{ const rel=o.od-dist, vis=rel>-9 && rel<(N-3)*SEG; o.m.visible=vis; if(vis){ const wx=cx(o.od)+o.lane-bikeX; o.m.position.set(wx,(hy(o.od)-by)+.15,6-rel); o.m.userData.wheels.forEach(w=>w.rotation.x-=o.sp*dt); } });
    const pos=rankAhead(opps,dist);
    camera.position.lerp(new THREE.Vector3(0,4.4,13),0.1); camera.lookAt(0,1,-4);
    setScore('🚵 '+Math.floor(dist)+'m/'+GOAL+'  ·  '+pos+'º  ·  '+names[ter]+(slope<-0.05?' ⬇️':slope>0.05?' ⬆️':'')+(onTrail?'':' ⚠️'));
    if(dist>=GOAL){ won=true; const rows=[{n:CHARS[hero].name,you:1,p:dist}].concat(opps.map(o=>({n:CHARS[o.rid].name,p:o.od}))).sort((a,b)=>b.p-a.p); finishGame(placePts(pos),placeText(pos)+' 🚵',rows); }
  }};
}

/* ===================== SCUOLA GUIDA (pista con curve) ===================== */
function DrivingSchool(){
  applyTheme(); const gr=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({map:groundTexture('roma'),roughness:.95})); gr.rotation.x=-Math.PI/2; gr.receiveShadow=true; world.add(gr); const clouds=addSky();
  const wp=[[0,20],[16,15],[20,2],[13,-14],[0,-20],[-15,-13],[-21,2],[-13,15]].map(p=>new THREE.Vector3(p[0],0,p[1]));
  const curve=new THREE.CatmullRomCurve3(wp,true,'catmullrom',0.5);
  const N=170, samples=curve.getPoints(N), W=6;
  for(let i=0;i<samples.length-1;i++){ const a=samples[i],b=samples[i+1]; const mid=a.clone().add(b).multiplyScalar(.5); const len=a.distanceTo(b)+0.5;
    const seg=new THREE.Mesh(new THREE.BoxGeometry(W,0.06,len),M(0x3a3d44,.9)); seg.position.set(mid.x,0.04,mid.z); seg.rotation.y=Math.atan2(b.x-a.x,b.z-a.z); seg.receiveShadow=true; world.add(seg); }
  for(let i=0;i<N;i+=7){ const u=i/N; const p=curve.getPointAt(u), t=curve.getTangentAt(u); const nx=t.z,nz=-t.x;
    [-1,1].forEach(s=>{ const c=new THREE.Mesh(new THREE.ConeGeometry(.25,.7,8),M(0xff7733,.5)); c.position.set(p.x+nx*W/2*s,.35,p.z+nz*W/2*s); c.castShadow=true; world.add(c); }); }
  // strisce: linea centrale tratteggiata + bordi bianchi
  for(let i=0;i<N;i++){ const u=i/N; const p=curve.getPointAt(u), tg=curve.getTangentAt(u), ry=Math.atan2(tg.x,tg.z), nx=tg.z,nz=-tg.x;
    if(i%4===0){ const d=new THREE.Mesh(new THREE.BoxGeometry(.16,.02,1.0),M(0xf5d020,.5)); d.position.set(p.x,.08,p.z); d.rotation.y=ry; world.add(d); }
    if(i%2===0)[-1,1].forEach(sg=>{ const e=new THREE.Mesh(new THREE.BoxGeometry(.1,.02,.6),M(0xffffff,.5)); e.position.set(p.x+nx*(W/2-.25)*sg,.08,p.z+nz*(W/2-.25)*sg); e.rotation.y=ry; world.add(e); }); }
  // linea di partenza a scacchi
  { const p=curve.getPointAt(0), tg=curve.getTangentAt(0), ry=Math.atan2(tg.x,tg.z), nx=tg.z,nz=-tg.x; for(let k=-3;k<=3;k++){ const sq=new THREE.Mesh(new THREE.BoxGeometry(.75,.03,.75),M((k+3)%2?0x111111:0xffffff)); sq.position.set(p.x+nx*k*0.8,.09,p.z+nz*k*0.8); sq.rotation.y=ry; world.add(sq); } }
  // semafori, tribuna con tifosi, alberi
  function semaforo(x,z){ const g=new THREE.Group(); const pole=cyl(.1,.12,3,0x333333); pole.position.y=1.5; g.add(pole); const bx2=new THREE.Mesh(new THREE.BoxGeometry(.42,1.1,.3),M(0x222222)); bx2.position.y=3; g.add(bx2); ['#e74c3c','#f1c40f','#2ecc71'].forEach((col,k)=>{ const l=new THREE.Mesh(new THREE.SphereGeometry(.12,10,10),new THREE.MeshStandardMaterial({color:col,emissive:new THREE.Color(col),emissiveIntensity:.6})); l.position.set(0,3.35-k*.33,.2); g.add(l); }); g.position.set(x,0,z); g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); world.add(g); }
  [0,0.33].forEach(u=>{ const p=curve.getPointAt(u), tg=curve.getTangentAt(u), nx=tg.z,nz=-tg.x; semaforo(p.x+nx*(W/2+1.1),p.z+nz*(W/2+1.1)); });

  let speed=0, lastSide=0, won=false, time=0; const START=Z0-1, END=Z1+2.6, LEN=START-END;
  setInstr('Alterna ◀ e ▶ (o AZIONE) per pattinare veloce: batti gli altri! ⛸️'); setScore('⛸️ 0%');
  function skate(c,ph){ c.rotation.z=Math.sin(ph*6)*0.12; c.userData.legs[0].rotation.x=Math.sin(ph*8)*.5; c.userData.legs[1].rotation.x=-Math.sin(ph*8)*.5; c.userData.arms[0].rotation.x=Math.sin(ph*8)*.6; c.userData.arms[1].rotation.x=-Math.sin(ph*8)*.6; }
  return { update(dt){ if(won)return; time+=dt;
    let stroke=0; if(hit('ArrowLeft'))stroke=-1; else if(hit('ArrowRight'))stroke=1; else if(hit('Space'))stroke=-lastSide||1;
    if(stroke){ if(stroke!==lastSide){ speed=Math.min(15,speed+2.2); beep(500,.05); } else speed=Math.min(15,speed+.7); lastSide=stroke; }
    speed*=Math.pow(.6,dt*1.3);
    me.z-=speed*dt; me.c.position.z=me.z; skate(me.c,time); if(!me.fin&&me.z<=END)me.fin=true;
    racers.forEach((r,i)=>{ if(r.isP)return; if(!r.fin){ const sp=Math.max(3,r.base+1.6*Math.sin(time*0.8+r.phase)+0.6*Math.sin(time*2.5+i)); r.z-=sp*dt; if(r.z<=END)r.fin=true; } r.c.position.z=r.z; skate(r.c,time+i); });
    camera.position.z=THREE.MathUtils.lerp(camera.position.z,me.z+6,.08); camera.position.x=THREE.MathUtils.lerp(camera.position.x,0,.1); camera.lookAt(0,1,me.z-6);
    const pos=1+racers.filter(r=>!r.isP&&r.z<me.z).length;
    setScore('⛸️ '+Math.floor(Math.min(1,(START-me.z)/LEN)*100)+'%  ·  '+pos+'º su '+laneX.length+'  ·  '+time.toFixed(1)+'s');
    if(me.fin){ won=true; const rows=racers.map(r=>({n:CHARS[r.cid].name,you:r.isP,p:-r.z})).sort((a,b)=>b.p-a.p); finishGame(placePts(pos),placeText(pos)+' ⛸️',rows); }
  }};
}

/* ===================== REGISTRO ===================== */
const GAME_FN={
  guida:DrivingSchool,
  moto:()=>DriveGame({veh:'moto',terrain:'road',goal:750,maxspeed:44,race:true}),
  bici:GameBiciMontagna,
  acquapark:()=>DriveGame({veh:'tube',terrain:'slide',goal:520,maxspeed:32}),
  parco_avventure:ParcoAvventure,
  cavallo:()=>RunnerGame({mode:'fence'}),
  calcio:GameCalcio, basket:GameBasket, piscina:GamePiscina, danza:GameDanza, pesca:GamePesca, giostre:GameGiostre, gavettoni:GameGavettoni, mare:GameMare, bowling:GameBowling,
  casa:()=>walkCollect(THEMES.casa), scuola:GameScuola, parco:()=>walkCollect(THEMES.parco),
  bar:()=>walkCollect(THEMES.bar), ristorante:()=>walkCollect(THEMES.ristorante), tennis:GameTennis, pattinaggio:GamePattinaggio,
  color_hotel:()=>walkCollect(THEMES.color_hotel), piazzetta:()=>walkCollect(THEMES.piazzetta), colosseo:()=>walkCollect(THEMES.colosseo),
};

/* ===================== TITOLO ===================== */
let titleActive=false, titleCousins=[], titlePhase=0;
function enterTitle(){ clearWorld(); applyTheme(); addGround2(CITIES.roma.ground); titleActive=true; titlePhase=0; titleCousins=[];
  ['letizia','giorgia','eleonora','corrado','giulio'].forEach((id,i)=>{ const c=buildCousin(id); c.position.set(-6+i*3,0,rand(-1,1)); c.rotation.y=Math.PI/2; world.add(c); c.userData.spd=rand(1.6,2.4); titleCousins.push(c); });
  camera.position.set(0,2.6,11); camera.lookAt(0,1,-1); }

/* ===================== FLOW ===================== */
let activeGame=null, gameOver=false;
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); document.getElementById('hud').classList.remove('on'); document.getElementById('pad').classList.remove('on'); if(id) document.getElementById(id).classList.add('on'); }
function hudOn(){ document.getElementById('hud').classList.add('on'); if(isTouch) document.getElementById('pad').classList.add('on'); }
const DRIVE_PAD=['guida','moto','acquapark','bici'], WALK_PAD=['casa','scuola','bar','ristorante','color_hotel','parco','piazzetta','colosseo','cavallo','mare'];
function padFor(gid){ return DRIVE_PAD.indexOf(gid)>=0?'drive':WALK_PAD.indexOf(gid)>=0?'race':''; }
function enterHub(){ titleActive=false; clearWorld(); showMsg(''); showPower(false); setPad('race'); gameOver=false; mode='hub'; activeGame=Hub(); show(null); hudOn(); }
function startGame(gid){ titleActive=false; clearWorld(); showMsg(''); showPower(false); setPad(padFor(gid)); gameOver=false; mode='game';
  try{ activeGame=(GAME_FN[gid]||(()=>walkCollect(THEMES.casa)))(); }catch(e){ console.error(e); activeGame=null; setInstr('Errore in '+gid+': '+(e&&e.message||e)); }
  show(null); hudOn(); }
function showResults(text,rows,points){ const el=document.getElementById('results'); let html='<h3>'+text+'</h3>';
  rows.forEach((r,i)=>{ const m=['🥇','🥈','🥉'][i]||((i+1)+'º'); html+='<div class="row'+(r.you?' you':'')+'"><div class="pos">'+m+'</div><div class="nm">'+r.n+(r.you?' (tu)':'')+'</div></div>'; });
  html+='<div class="pts">+'+points+' ★</div>'; el.innerHTML=html; el.classList.add('on'); }
function hideResults(){ document.getElementById('results').classList.remove('on'); }
function finishGame(points,text,rows){ if(gameOver)return; gameOver=true;
  points=Math.round(Number(points)); if(!Number.isFinite(points))points=0; if(!Number.isFinite(total))total=0;
  total+=points; localStorage.setItem('cugini3d_total',String(total));
  beep(700,.12); setTimeout(()=>beep(1000,.14),120);
  let delay=2200;
  if(rows&&rows.length){ showResults(text,rows,points); delay=4200; } else { showMsg(text+'  +'+points+'★'); }
  setTimeout(()=>{ activeGame=null; gameOver=false; hideResults(); enterHub(); },delay); }
document.getElementById('back').addEventListener('click',()=>{ if(mode==='game'){ enterHub(); } else { activeGame=null; clearWorld(); show('s_map'); } });

/* anteprime avatar */
let thumbR=null,thumbScene=null,thumbCam=null; const thumbCache={};
function thumbInit(){ const c=document.createElement('canvas'); c.width=170;c.height=220;
  thumbR=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true,preserveDrawingBuffer:true}); thumbR.setPixelRatio(2); thumbR.setSize(170,220,false);
  thumbScene=new THREE.Scene(); thumbScene.add(new THREE.AmbientLight(0xffffff,.85)); const d=new THREE.DirectionalLight(0xffffff,.7); d.position.set(2,4,3); thumbScene.add(d);
  thumbCam=new THREE.PerspectiveCamera(34,170/220,.1,50); thumbCam.position.set(0,1.05,3.4); thumbCam.lookAt(0,.95,0); }
function avatarThumb(id){ if(thumbCache[id])return thumbCache[id]; if(!thumbR)thumbInit();
  suppressName=true; const g=buildCousin(id); suppressName=false; thumbScene.add(g); thumbR.render(thumbScene,thumbCam); const url=thumbR.domElement.toDataURL();
  thumbScene.remove(g); g.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());} }); thumbCache[id]=url; return url; }
function buildCharGrid(){ const el=document.getElementById('charGrid'); el.innerHTML='';
  CHAR_IDS.forEach(id=>{ const cfg=CHARS[id]; const d=document.createElement('div'); d.className='card'+(id===hero?' sel':'');
    d.innerHTML='<img class="avt" src="'+avatarThumb(id)+'" alt="'+cfg.name+'"><div class="nm">'+cfg.name+'</div>';
    d.onclick=()=>{ hero=id; [...el.children].forEach(c=>c.classList.remove('sel')); d.classList.add('sel'); }; el.appendChild(d); }); }

/* wiring */
document.getElementById('startBtn').onclick=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} titleActive=false; buildCharGrid(); show('s_char'); };
document.getElementById('charNext').onclick=()=>{ document.querySelectorAll('.mkb').forEach(m=>m.classList.toggle('sel',m.dataset.city===city)); show('s_map'); };
document.getElementById('mapBack').onclick=()=>{ show('s_char'); };
document.querySelectorAll('.mkb').forEach(m=>{ m.addEventListener('click',()=>{ city=m.dataset.city; enterHub(); }); });
// rendi trasparente lo sfondo bianco della mappa
(function(){ const im=new Image(); im.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=im.width; c.height=im.height; const x=c.getContext('2d'); x.drawImage(im,0,0); const d=x.getImageData(0,0,c.width,c.height), a=d.data; for(let i=0;i<a.length;i+=4){ if(a[i]>234&&a[i+1]>234&&a[i+2]>234) a[i+3]=0; } x.putImageData(d,0,0); document.getElementById('italyImg').src=c.toDataURL(); }catch(e){} }; im.src='italia.jpg'; })();

/* loop */
function loop(){ const dt=Math.min(0.05,clock.getDelta());
  if(titleActive){ titlePhase+=dt; titleCousins.forEach((c,i)=>{ c.position.x+=c.userData.spd*dt; if(c.position.x>8)c.position.x-=16; walkAnim(c,titlePhase*8+i); }); }
  else if(activeGame){ try{ activeGame.update(dt); }catch(e){ console.error(e); setInstr('Errore: '+(e&&e.message||e)); } }
  if(shakeT>0){ shakeT-=dt; camera.position.x+=Math.sin(performance.now()*.05)*.06; } clearJust(); renderer.render(scene,camera); requestAnimationFrame(loop); }
enterTitle(); loop();
}
