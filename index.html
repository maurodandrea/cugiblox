<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Avventure a Roma - Papà e Figlia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1a1228;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    background: #0d2b3e;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    max-width: 100%;
    max-height: 100%;
    touch-action: none;
  }
  #hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,.45);
    text-align: center;
    pointer-events: none;
  }
  /* Touch controls */
  #touch {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
    z-index: 5;
  }
  .pad {
    position: absolute;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    left: calc(20px + env(safe-area-inset-left, 0px));
    width: 180px;
    height: 180px;
    pointer-events: auto;
  }
  .pad button {
    position: absolute;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,.18);
    color: #fff;
    font-size: 26px;
    backdrop-filter: blur(4px);
    touch-action: none;
  }
  .pad button:active { background: rgba(255,255,255,.45); }
  .pad .up { left: 60px; top: 0; }
  .pad .down { left: 60px; top: 120px; }
  .pad .left { left: 0; top: 60px; }
  .pad .right { left: 120px; top: 60px; }
  #act {
    position: absolute;
    bottom: calc(34px + env(safe-area-inset-bottom, 0px));
    right: calc(24px + env(safe-area-inset-right, 0px));
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    background: rgba(255,180,60,.88);
    color: #3a2400;
    font-size: 18px;
    font-weight: bold;
    pointer-events: auto;
    touch-action: none;
  }
  #act:active { transform: scale(.92); }
  #backbtn {
    position: absolute;
    top: calc(12px + env(safe-area-inset-top, 0px));
    right: calc(14px + env(safe-area-inset-right, 0px));
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: 20px;
    pointer-events: auto;
    touch-action: none;
  }
  #backbtn:active { background: rgba(0,0,0,.7); }
  /* Avviso rotazione su cellulare in verticale */
  #rotate {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1228;
    z-index: 20;
    text-align: center;
    padding: 20px;
  }
  #rotate .ico { font-size: 64px; animation: spin 2s ease-in-out infinite; }
  #rotate p { margin-top: 16px; font-size: 18px; color: #ffd86b; }
  #rotate small { margin-top: 8px; color: rgba(255,255,255,.6); }
  @keyframes spin { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="600"></canvas>
  <div id="touch">
    <div class="pad">
      <button class="up" data-k="ArrowUp">▲</button>
      <button class="down" data-k="ArrowDown">▼</button>
      <button class="left" data-k="ArrowLeft">◀</button>
      <button class="right" data-k="ArrowRight">▶</button>
    </div>
    <button id="act" data-k="Space">AZIONE</button>
    <button id="backbtn" data-k="Escape">✕</button>
  </div>
  <div id="hint">Frecce / WASD per muoverti &nbsp;·&nbsp; SPAZIO per azione &nbsp;·&nbsp; ESC per tornare alla mappa</div>
  <div id="rotate">
    <div class="ico">📱</div>
    <p>Ruota il telefono in orizzontale</p>
    <small>per giocare al meglio a schermo intero</small>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   LE AVVENTURE A ROMA — un gioco per papà e figlia
   Unico file, nessuna dipendenza. Tutto disegnato su canvas.
   ===================================================================== */

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

/* ---------- Input ---------- */
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  const k = norm(e.key);
  if (!keys[k]) justPressed[k] = true;
  keys[k] = true;
});
window.addEventListener('keyup', e => { keys[norm(e.key)] = false; });
function norm(k){
  if (k === ' ') return 'Space';
  if (k === 'w'||k==='W') return 'ArrowUp';
  if (k === 's'||k==='S') return 'ArrowDown';
  if (k === 'a'||k==='A') return 'ArrowLeft';
  if (k === 'd'||k==='D') return 'ArrowRight';
  return k;
}
function pressed(k){ if (justPressed[k]){ return true; } return false; }
function clearJust(){ for (const k in justPressed) justPressed[k] = false; }

/* Touch controls */
if ('ontouchstart' in window || navigator.maxTouchPoints) {
  document.getElementById('touch').style.display = 'block';
  document.getElementById('hint').style.display = 'none';
  document.querySelectorAll('#touch button').forEach(b => {
    const k = b.dataset.k === 'Space' ? 'Space' : b.dataset.k;
    const down = ev => { ev.preventDefault(); if(!keys[k]) justPressed[k]=true; keys[k]=true; };
    const up   = ev => { ev.preventDefault(); keys[k]=false; };
    b.addEventListener('touchstart', down);
    b.addEventListener('touchend', up);
    b.addEventListener('mousedown', down);
    b.addEventListener('mouseup', up);
  });
}

/* ---------- Audio (semplici beep generati) ---------- */
let AC = null;
function beep(freq=440, dur=0.08, type='square', vol=0.04){
  try {
    if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(AC.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.stop(AC.currentTime + dur);
  } catch(e){}
}

/* ---------- Util ---------- */
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const rand = (a,b)=>a+Math.random()*(b-a);
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* =====================================================================
   PERSONAGGI — disegnati a mano (cartoon), sistema parametrico.
   Ogni personaggio è definito da: colore/stile capelli, pelle, vestiti,
   barba, bambino/adulto. Vedi la lista CHARACTERS più sotto.
   ===================================================================== */
function drawHair(style, color){
  ctx.fillStyle = color;
  if (style === 'longStraight'){           // capelli lunghi e lisci
    ctx.beginPath(); ctx.arc(0, -12, 10, Math.PI, 0); ctx.fill();
    rr(-10, -13, 5, 22, 3); ctx.fill();
    rr(5, -13, 5, 22, 3); ctx.fill();
  } else if (style === 'medium'){           // lunghezza media (alle spalle)
    ctx.beginPath(); ctx.arc(0, -12, 10, Math.PI, 0); ctx.fill();
    rr(-10, -13, 5, 14, 3); ctx.fill();
    rr(5, -13, 5, 14, 3); ctx.fill();
  } else if (style === 'short'){            // corti
    ctx.beginPath(); ctx.arc(0, -16, 10, Math.PI, 0); ctx.fill();
    ctx.fillRect(-10, -16, 20, 3);
  } else if (style === 'curly'){            // ricci
    ctx.beginPath(); ctx.arc(0, -13, 10, Math.PI, 0); ctx.fill();
    for (let i=0;i<7;i++){ const a = Math.PI + i*(Math.PI/6);
      ctx.beginPath(); ctx.arc(Math.cos(a)*10, -13+Math.sin(a)*6, 4.5, 0, 7); ctx.fill(); }
    ctx.beginPath(); ctx.arc(-9,-11,4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-11,4,0,7); ctx.fill();
  } else if (style === 'bob'){              // caschetto
    ctx.beginPath(); ctx.arc(0, -12, 11, Math.PI, 0); ctx.fill();
    rr(-11, -12, 4, 16, 2); ctx.fill();
    rr(7, -12, 4, 16, 2); ctx.fill();
    ctx.fillRect(-10, -15, 20, 5);          // frangia
  } else if (style === 'buzz'){             // capelli a spazzola
    ctx.beginPath(); ctx.arc(0, -12, 9.5, Math.PI, 0); ctx.fill();
    for (let i=-3;i<=3;i++) ctx.fillRect(i*2.6-0.8, -22, 1.6, 4);
  } else if (style === 'curlyShort'){       // ricci corti
    ctx.beginPath(); ctx.arc(0, -13, 9.5, Math.PI, 0); ctx.fill();
    for (let i=0;i<6;i++){ const a = Math.PI + i*(Math.PI/5);
      ctx.beginPath(); ctx.arc(Math.cos(a)*9, -13+Math.sin(a)*4, 3.5, 0, 7); ctx.fill(); }
  }
}

function drawChar(x, y, s=1, face=0, walk=0, o={}){
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  const bob = Math.sin(walk)*1.5;
  ctx.translate(0, bob);
  // i bambini sono più piccoli (in base all'età), coi piedi sulla stessa linea
  const k = o.child ? clamp(0.6 + (o.age-6)*0.03, 0.55, 0.85) : 1;
  ctx.translate(0, 45*(1-k));
  ctx.scale(k, k);

  const skin = o.skin || '#f0c9a8';
  const legSw = Math.sin(walk)*4, armSw = Math.sin(walk)*3;
  const tw = o.broad ? 12 : 10;             // mezza larghezza torso

  // gambe (pelle se shorts, altrimenti colore pantaloni)
  ctx.fillStyle = o.shorts ? skin : (o.pants || '#4a6fa5');
  rr(-7, 26, 6, 16+legSw, 3); ctx.fill();
  rr(1, 26, 6, 16-legSw, 3); ctx.fill();
  // scarpe
  ctx.fillStyle = o.shoes || '#fff';
  rr(-9, 40+legSw, 9, 5, 2); ctx.fill();
  rr(0, 40-legSw, 9, 5, 2); ctx.fill();
  // shorts / fianchi
  ctx.fillStyle = o.pants || '#4a6fa5';
  rr(-9, 18, 18, 12, 3); ctx.fill();
  // maglia
  ctx.fillStyle = o.shirt || '#f7f7f7';
  rr(-tw, 0, tw*2, 22, 5); ctx.fill();
  // numero / decoro
  if (o.number){ ctx.fillStyle = o.accent || '#5a6470';
    ctx.font = 'bold 7px Arial'; ctx.textAlign = 'center'; ctx.fillText(o.number, 0, 13); }
  // braccia
  ctx.strokeStyle = skin; ctx.lineWidth = o.broad ? 5 : 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-tw+1, 3); ctx.lineTo(-tw-2, 14+armSw); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tw-1, 3); ctx.lineTo(tw+2, 14-armSw); ctx.stroke();
  // testa
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -10, 9, 0, Math.PI*2); ctx.fill();
  // barba
  if (o.beard){ ctx.fillStyle = 'rgba(80,60,45,.45)';
    ctx.beginPath(); ctx.arc(0, -6, 9, 0.1*Math.PI, 0.9*Math.PI); ctx.fill(); }
  // capelli
  drawHair(o.hairStyle || 'short', o.hair || '#52443a');
  // viso
  ctx.fillStyle = '#2a2018';
  ctx.beginPath(); ctx.arc(-3.2, -10, 1.3, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(3.2, -10, 1.3, 0, 7); ctx.fill();
  ctx.strokeStyle = '#c47a6a'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, -6, 3, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  ctx.restore();
}

/* Registro dei personaggi giocabili */
const CHARACTERS = [
  { id:'giorgia', name:'Giorgia (10)', o:{ child:true, age:10, hair:'#7a4a28', hairStyle:'longStraight',
      skin:'#f3cda9', shirt:'#f7f7f7', number:'95', accent:'#5a6470', pants:'#4a6fa5', shorts:true, shoes:'#fff' } },
  { id:'babbo', name:'Babbo', o:{ hair:'#52443a', hairStyle:'short', beard:true, broad:true,
      skin:'#e8b894', shirt:'#5a6b85', pants:'#6a8fc0', shoes:'#dadada' } },
  { id:'letizia', name:'Letizia (12)', o:{ child:true, age:12, hair:'#b8895a', hairStyle:'longStraight',
      skin:'#f6d6b8', shirt:'#ff9ec4', pants:'#d56fa0', shorts:true, shoes:'#fff' } },
  { id:'eleonora', name:'Eleonora (10)', o:{ child:true, age:10, hair:'#c79a5b', hairStyle:'medium',
      skin:'#f3cda9', shirt:'#b07cd6', pants:'#5b4a8a', shoes:'#eee' } },
  { id:'corrado', name:'Corrado (8)', o:{ child:true, age:8, hair:'#8a5a30', hairStyle:'curlyShort',
      skin:'#f0c9a8', shirt:'#4cae58', pants:'#3a6fa0', shoes:'#e74c3c' } },
  { id:'giulio', name:'Giulio (6)', o:{ child:true, age:6, hair:'#2a2018', hairStyle:'buzz',
      skin:'#f0c9a8', shirt:'#ffce3a', pants:'#444', shoes:'#222' } },
];
function charById(id){ return CHARACTERS.find(c=>c.id===id) || CHARACTERS[0]; }
function drawCharId(id, x, y, s, face, walk){ drawChar(x, y, s, face, walk, charById(id).o); }

/* compatibilità con il resto del codice */
function drawDaughter(x, y, s=1, face=0, walk=0){ drawCharId('giorgia', x, y, s, face, walk); }
function drawDad(x, y, s=1, face=0, walk=0){ drawCharId('babbo', x, y, s, face, walk); }

/* =====================================================================
   STATO GLOBALE
   ===================================================================== */
let scene = null;          // scena corrente
const visited = {};        // attività completate (per id)
let heroChoice = 'giorgia';   // personaggio giocante
let companionChoice = 'babbo';// accompagnatore scelto
let toast = null, toastT = 0;
function showToast(msg){ toast = msg; toastT = 150; }

/* ---------- Salvataggio progressi (localStorage) ---------- */
const SAVE_KEY = 'cugini_adventure_save_v1';
function saveGame(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({
    visited, hero: heroChoice, comp: companionChoice, city: currentCity })); } catch(e){}
}
function loadGame(){
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d){
      Object.assign(visited, d.visited||{});
      if (d.hero && CHARACTERS.some(c=>c.id===d.hero)) heroChoice = d.hero;
      if (d.comp && CHARACTERS.some(c=>c.id===d.comp)) companionChoice = d.comp;
      if (d.city && CITIES.some(c=>c.id===d.city)) currentCity = d.city;
    }
  } catch(e){}
}
function resetGame(){
  for (const k in visited) delete visited[k];
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
  showToast('Progressi azzerati');
}

/* ---------- Disegna il personaggio scelto / il compagno ---------- */
function drawPlayer(x,y,s,face,walk){ drawCharId(heroChoice, x,y,s,face,walk); }
function drawCompanion(x,y,s,face,walk){ drawCharId(companionChoice, x,y,s,face,walk); }

function setScene(s){
  scene = s;
  if (scene.enter) scene.enter();
}

/* sfondo a gradiente riutilizzabile */
function sky(top, bottom){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

function header(title, color='#ffd86b'){
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  rr(W/2-180, 14, 360, 40, 12); ctx.fill();
  ctx.fillStyle = color;
  ctx.font = 'bold 24px Trebuchet MS';
  ctx.textAlign = 'center';
  ctx.fillText(title, W/2, 42);
  // stelle
  ctx.font = '18px Arial'; ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd86b';
  ctx.fillText('★ ' + cityDone() + '/' + LOCATIONS.length, W-20, 36);
}

function backHint(){
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = '13px Trebuchet MS'; ctx.textAlign = 'center';
  ctx.fillText('ESC per tornare alla mappa', W/2, H-14);
}

function completeActivity(id){
  if (!visited[id]){
    visited[id] = true;
    beep(880,0.1); setTimeout(()=>beep(1100,0.12),100);
    showToast('★ Attività completata! +1 stella');
    saveGame();
  } else {
    showToast('Già completata — ben rigiocata!');
  }
}

/* =====================================================================
   LE LOCATION — info per ogni attività e composizione per città
   ===================================================================== */
const LOC_INFO = {
  roma:    { name:'Colosseo',      emoji:'🏛️', color:'#d9a441' },
  mare:    { name:'Al Mare',       emoji:'🏖️', color:'#37b6c9' },
  moto:    { name:'In Moto',       emoji:'🏍️', color:'#e0533d' },
  bowling: { name:'Bowling',       emoji:'🎳', color:'#9b59b6' },
  scuola:  { name:'A Scuola',      emoji:'🏫', color:'#5d8def' },
  lavoro:  { name:'Al Lavoro',     emoji:'💼', color:'#7f8c8d' },
  acqua:   { name:'Acqua Park',    emoji:'🌊', color:'#2dc3e8' },
  bici:    { name:'In Bici',       emoji:'🚲', color:'#27ae60' },
  cavallo: { name:'A Cavallo',     emoji:'🐴', color:'#b5651d' },
  danza:   { name:'A Danza',       emoji:'💃', color:'#e84393' },
  basket:  { name:'Basket',        emoji:'🏀', color:'#e67e22' },
  calcio:  { name:'Calcio',        emoji:'⚽', color:'#2ecc71' },
  piscina: { name:'Piscina',       emoji:'🏊', color:'#3498db' },
  casa:    { name:'Casa',          emoji:'🏠', color:'#e74c3c' },
  disegno: { name:'Disegno',       emoji:'🎨', color:'#f1c40f' },
  parco:   { name:'Al Parco',      emoji:'🌳', color:'#16a085' },
  bar:     { name:'Al Bar',        emoji:'🍦', color:'#fd79a8' },
  cinese:  { name:'Negozio Cinese',emoji:'🏮', color:'#c0392b' },
  criceto: { name:'Il Criceto',    emoji:'🐹', color:'#d35400' },
  parcoavventura: { name:'Parco Avventure', emoji:'🧗', color:'#2d8659' },
  colorhotel:     { name:'Color Hotel',     emoji:'🏨', color:'#8e44ad' },
  scuolaguida:    { name:'Scuola Guida',    emoji:'🚗', color:'#34495e' },
  pesca:          { name:'Pesca',           emoji:'🎣', color:'#1f7a8c' },
  giostre:        { name:'Giostre',         emoji:'🎠', color:'#e84393' },
  piazzetta:      { name:'Piazzetta',       emoji:'⛲', color:'#e67e22' },
  gavettoni:      { name:'Gavettoni',       emoji:'🎈', color:'#3498db' },
  ristorante:     { name:'Ristorante',      emoji:'🍝', color:'#c0392b' },
};

const CITIES = [
  { id:'matera',  name:'Matera',  emoji:'🪨',
    locs:['cavallo','scuola','parco','cinese','bar','casa','parcoavventura','calcio','basket','piscina'] },
  { id:'roma',    name:'Roma',    emoji:'🏛️',
    locs:['roma','scuola','casa','parco','danza','piscina','colorhotel','scuolaguida','moto','bici'] },
  { id:'rossano', name:'Rossano', emoji:'🌅',
    locs:['mare','piscina','acqua','pesca','giostre','bar','bici','piazzetta','gavettoni','ristorante'] },
];

let LOCATIONS = [];        // luoghi della città scelta (riempito da buildCity)
let currentCity = 'roma';

function layoutGrid(){
  const cols = 5, x0 = 110, dx = 175;
  const rows = Math.max(1, Math.ceil(LOCATIONS.length / cols));
  const top = 200, bottom = 470;
  const dy = rows > 1 ? (bottom - top) / (rows - 1) : 0;
  LOCATIONS.forEach((L,i)=>{ L.x = x0 + (i%cols)*dx; L.y = top + Math.floor(i/cols)*dy; });
}
function buildCity(cityId){
  const c = CITIES.find(c=>c.id===cityId) || CITIES[1];
  currentCity = c.id;
  LOCATIONS = c.locs.map(id => Object.assign({ id }, LOC_INFO[id]));
  layoutGrid();
}
function cityDone(){ return LOCATIONS.reduce((n,L)=> n + (visited[L.id]?1:0), 0); }
function totalDone(){ return Object.keys(visited).filter(k=>visited[k]).length; }

/* =====================================================================
   MENU INIZIALE
   ===================================================================== */
const Menu = {
  t: 0,
  enter(){ this.t = 0; },
  update(){
    this.t++;
    if (pressed('Space') || pressed('Enter')){ beep(660,0.1); setScene(CharSelect); }
    if (pressed('r') || pressed('R')) resetGame();
  },
  draw(){
    sky('#2c1a4a', '#7b3f8f');
    // sole/luna
    ctx.fillStyle = '#ffd86b';
    ctx.beginPath(); ctx.arc(W-130, 120, 50, 0, 7); ctx.fill();
    // skyline Roma stilizzato
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    for (let i=0;i<10;i++){
      const bx = i*100, bh = 80+((i*53)%90);
      ctx.fillRect(bx, H-bh, 90, bh);
    }
    // Colosseo silhouette
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    rr(W/2-90, H-150, 180, 110, 30); ctx.fill();

    // i cuginetti che salutano
    drawCharId('letizia',  W/2-160, 340, 2.0, 0, this.t*0.05);
    drawCharId('giorgia',  W/2-85,  340, 2.0, 0, this.t*0.05+1);
    drawCharId('eleonora', W/2-10,  340, 2.0, 0, this.t*0.05+2);
    drawCharId('corrado',  W/2+70,  340, 2.0, 0, this.t*0.05+3);
    drawCharId('giulio',   W/2+150, 340, 2.0, 0, this.t*0.05+4);

/* =====================================================================
   SELEZIONE PERSONAGGIO
   ===================================================================== */
function charGridNav(self, list){
  self.t++;
  const n = list.length, c = self.cols;
  if (pressed('ArrowLeft')){ self.sel = (self.sel + n - 1) % n; beep(500,0.06); }
  if (pressed('ArrowRight')){ self.sel = (self.sel + 1) % n; beep(500,0.06); }
  if (pressed('ArrowUp')){ self.sel = (self.sel + n - c) % n; beep(500,0.06); }
  if (pressed('ArrowDown')){ self.sel = (self.sel + c) % n; beep(500,0.06); }
}
function charGridDraw(self, list, title, footer){
  sky('#2c1a4a', '#5b3f8f');
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.font = 'bold 30px Trebuchet MS';
  ctx.fillText(title, W/2, 58);
  const cols = self.cols, cw = 210, ch = 190, gap = 22;
  const totW = cols*cw + (cols-1)*gap;
  const x0 = (W - totW)/2, y0 = 86;
  list.forEach((c,i)=>{
    const cx = x0 + (i%cols)*(cw+gap);
    const cy = y0 + Math.floor(i/cols)*(ch+gap);
    const on = self.sel === i;
    ctx.fillStyle = on ? 'rgba(255,216,107,.22)' : 'rgba(255,255,255,.06)';
    rr(cx, cy, cw, ch, 16); ctx.fill();
    ctx.lineWidth = on ? 5 : 2;
    ctx.strokeStyle = on ? '#ffd86b' : 'rgba(255,255,255,.25)';
    rr(cx, cy, cw, ch, 16); ctx.stroke();
    drawCharId(c.id, cx+cw/2, cy+118, 1.6, 0, on ? self.t*0.06 : 0);
    ctx.fillStyle = on ? '#ffd86b' : '#fff';
    ctx.font = 'bold 19px Trebuchet MS';
    ctx.fillText(c.name, cx+cw/2, cy+30);
  });
  ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '15px Trebuchet MS';
  ctx.fillText(footer, W/2, H-22);
}

/* =====================================================================
   HUB — mappa della città, esplorabile dall'alto
   ===================================================================== */
const Hub = {
  px: 140, py: 280, dad: {x:120, y:300}, walk:0, near:null, t:0,
  enter(){ this.near = null; this.t = 0; },
  update(){
    this.t++;
    let dx=0, dy=0;
    if (keys['ArrowLeft']) dx=-1;
    if (keys['ArrowRight']) dx=1;
    if (keys['ArrowUp']) dy=-1;
    if (keys['ArrowDown']) dy=1;
    const sp = 3.2;
    if (dx||dy){
      const m = Math.hypot(dx,dy)||1;
      this.px = clamp(this.px + dx/m*sp, 30, W-30);
      this.py = clamp(this.py + dy/m*sp, 90, H-40);
      this.walk += 0.25;
      this.facing = dx<0?-1:(dx>0?1:this.facing);
    }
    // papà segue
    const fdx = this.px - this.dad.x - 28, fdy = this.py - this.dad.y;
    const fd = Math.hypot(fdx,fdy);
    if (fd > 5){ this.dad.x += fdx*0.06; this.dad.y += fdy*0.06; }

    // luogo più vicino (prende il più vicino in raggio)
    this.near = null; let bestD = 40;
    for (const L of LOCATIONS){
      const d = Math.hypot(L.x-this.px, L.y-this.py);
      if (d < bestD){ bestD = d; this.near = L; }
    }
    if (this.near && pressed('Space')){
      beep(700,0.08);
      setScene(SCENES[this.near.id]);
    }
    // ESC / ✕ per cambiare città
    if (pressed('Escape')){ beep(300,0.08); setScene(CitySelect); return; }
  },
  draw(){
    drawHubBackground(this.t || 0);
    // strade che collegano i luoghi
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 6;
    ctx.setLineDash([10,8]);
    ctx.beginPath();
    for (let i=0;i<LOCATIONS.length;i++){
      const L=LOCATIONS[i];
      if(i===0) ctx.moveTo(L.x,L.y); else ctx.lineTo(L.x,L.y);
    }
    ctx.stroke(); ctx.setLineDash([]);

    // marker dei luoghi
    for (const L of LOCATIONS){
      const done = visited[L.id];
      const hot = this.near === L;
      const R = hot ? 38 : 34;             // icone più grandi (evidenziate se vicine)
      // alone
      ctx.fillStyle = 'rgba(0,0,0,.12)';
      ctx.beginPath(); ctx.arc(L.x, L.y+3, R, 0, 7); ctx.fill();
      // cerchio colorato
      ctx.fillStyle = L.color;
      ctx.beginPath(); ctx.arc(L.x, L.y, R, 0, 7); ctx.fill();
      ctx.lineWidth = hot ? 4 : 2;
      ctx.strokeStyle = hot ? '#fff' : 'rgba(255,255,255,.6)';
      ctx.beginPath(); ctx.arc(L.x, L.y, R, 0, 7); ctx.stroke();
      // emoji grande
      ctx.font = (hot?40:36)+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(L.emoji, L.x, L.y+1);
      ctx.textBaseline='alphabetic';
      // nome su pillola leggibile
      ctx.font = 'bold 15px Trebuchet MS';
      const tw = ctx.measureText(L.name).width;
      ctx.fillStyle = 'rgba(20,12,30,.78)';
      rr(L.x - tw/2 - 8, L.y + R + 4, tw + 16, 22, 8); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(L.name, L.x, L.y + R + 20);
      if (done){
        ctx.fillStyle = '#ffd000'; ctx.font='20px Arial';
        ctx.fillText('★', L.x + R - 4, L.y - R + 8);
      }
    }

    // personaggi: il compagno segue, il giocatore guida
    drawCompanion(this.dad.x, this.dad.y, 1, 0, this.walk*0.8);
    drawPlayer(this.px, this.py, 1, 0, this.walk);

    const cityName = (CITIES.find(c=>c.id===currentCity)||{}).name || 'Città';
    header('MAPPA · ' + cityName.toUpperCase());

    // punteggio totale tra tutte le città
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    rr(14, 60, 168, 28, 8); ctx.fill();
    ctx.fillStyle = '#ffd86b'; ctx.font = 'bold 15px Trebuchet MS'; ctx.textAlign = 'left';
    ctx.fillText('Totale ★ ' + totalDone(), 26, 79);

    // prompt
    if (this.near){
      ctx.fillStyle = 'rgba(0,0,0,.6)';
      rr(W/2-150, H-58, 300, 36, 10); ctx.fill();
      ctx.fillStyle = '#ffd86b'; ctx.font='bold 16px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('SPAZIO ▶ ' + this.near.name, W/2, H-34);
    } else {
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='13px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('Cammina su un luogo e premi SPAZIO  ·  ESC / ✕ per cambiare città', W/2, H-30);
    }

    if (LOCATIONS.length && cityDone() === LOCATIONS.length){
      const cityName = (CITIES.find(c=>c.id===currentCity)||{}).name || 'la città';
      ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#ffd86b'; ctx.font='bold 34px Trebuchet MS'; ctx.textAlign='center';
      ctx.fillText('🎉 AVVENTURA COMPLETATA! 🎉', W/2, H/2-20);
      ctx.fillStyle='#fff'; ctx.font='20px Trebuchet MS';
      ctx.fillText('Avete visitato tutta ' + cityName + ' insieme!', W/2, H/2+20);
    }
  }
};

/* =====================================================================
   SCENA: IN MOTO (schiva il traffico)
   ===================================================================== */
const MotoScene = {
  enter(){ this.lane=1; this.lanes=[W/2-120,W/2,W/2+120]; this.cars=[]; this.dist=0; this.spawn=0; this.crash=0; this.t=0; },
  update(){
    this.t++;
    if (escToHub()) return;
    if (this.crash>0){ this.crash--; if(this.crash===0){} }
    if (pressed('ArrowLeft')) this.lane=clamp(this.lane-1,0,2);
    if (pressed('ArrowRight')) this.lane=clamp(this.lane+1,0,2);
    this.dist += 0.25;
    if (--this.spawn<=0){ this.spawn=Math.max(22,60-this.dist*0.2); this.cars.push({l:Math.floor(rand(0,3)),y:-60}); }
    const px=this.lanes[this.lane], py=H-90;
    for(const c of this.cars){ c.y+=5+this.dist*0.05;
      if (Math.abs(c.y-py)<40 && c.l===this.lane && this.crash===0){ this.crash=60; beep(150,0.2); this.dist=Math.max(0,this.dist-15);} }
    this.cars=this.cars.filter(c=>c.y<H+60);
    if (this.dist>=100){ completeActivity('moto'); setScene(Hub); }
  },
  draw(){
    sky('#6a7a8a','#aab8c4');
    // strada
    ctx.fillStyle='#3a3a42'; ctx.fillRect(W/2-180,0,360,H);
    // strisce
    ctx.strokeStyle='#ffd86b'; ctx.lineWidth=6; ctx.setLineDash([30,30]);
    ctx.lineDashOffset = -(this.t*8)%60;
    for(const lx of [W/2-60,W/2+60]){ ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke(); }
    ctx.setLineDash([]);
    // auto traffico

/* =====================================================================
   SCENA: BOWLING (mira e tira)
   ===================================================================== */
const BowlingScene = {
  enter(){ this.phase='aim'; this.angle=0; this.dir=1; this.power=0; this.ball=null; this.pins=this.newPins(); this.score=0; this.rolls=0; this.t=0; },
  newPins(){ const p=[]; const cx=W/2, top=120;
    let n=0; for(let r=0;r<4;r++) for(let c=0;c<=r;c++){ p.push({x:cx-(r*18)+c*36, y:top+r*30, down:false}); n++; } return p; },
  update(){
    this.t++;
    if (escToHub()) return;
    if (this.phase==='aim'){
      this.angle+=this.dir*0.9; if(Math.abs(this.angle)>35) this.dir*=-1;
      if (pressed('Space')) this.phase='power';
    } else if (this.phase==='power'){
      this.power+=this.dir2||(this.dir2=2); this.power+= 0;
      this.pw=(this.pw||0)+ (this.pwd||(this.pwd=1))*3;
      if(this.pw>100||this.pw<0) this.pwd*=-1;
      if (pressed('Space')){ this.phase='roll'; const a=this.angle*Math.PI/180;
        this.ball={x:W/2,y:H-80,vx:Math.sin(a)*6,vy:-(4+this.pw*0.08)}; }
    } else if (this.phase==='roll'){
      const b=this.ball; b.x+=b.vx; b.y+=b.vy;
      for(const p of this.pins){ if(!p.down && Math.hypot(p.x-b.x,p.y-b.y)<18){ p.down=true; this.score++; beep(600+this.score*40,0.06);} }
      if (b.y<80 || b.x<60 || b.x>W-60){ this.rolls++; this.pw=0; this.power=0;
        if (this.rolls>=2 || this.pins.every(p=>p.down)){
          completeActivity('bowling'); setScene(Hub);
        } else this.phase='aim';
      }
    }
  },
  draw(){
    sky('#3a2a5a','#1a1430');
    // pista
    ctx.fillStyle='#caa472'; ctx.beginPath();
    ctx.moveTo(W/2-40,H); ctx.lineTo(W/2-150,80); ctx.lineTo(W/2+150,80); ctx.lineTo(W/2+40,H); ctx.closePath(); ctx.fill();
    // canaline
    ctx.strokeStyle='#222'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(W/2-40,H); ctx.lineTo(W/2-150,80); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W/2+40,H); ctx.lineTo(W/2+150,80); ctx.stroke();
    // birilli
    for(const p of this.pins){ if(p.down) continue;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(p.x,p.y,8,14,0,0,7); ctx.fill();
      ctx.strokeStyle='#e0533d'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(p.x-5,p.y-4); ctx.lineTo(p.x+5,p.y-4); ctx.stroke();
    }
    // palla
    if(this.ball){ ctx.fillStyle='#3a6ed8'; ctx.beginPath(); ctx.arc(this.ball.x,this.ball.y,12,0,7); ctx.fill(); }
    // mira
    if(this.phase==='aim'||this.phase==='power'){
      const a=this.angle*Math.PI/180;
      ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3; ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.moveTo(W/2,H-80); ctx.lineTo(W/2+Math.sin(a)*200, H-80-Math.cos(a)*200); ctx.stroke();
      ctx.setLineDash([]);
    }
    // giocatori
    drawPlayer(W/2-30,H-50,1,0,0);
    drawCompanion(W/2+30,H-50,1,0,0);

    header('BOWLING','#fff');
    ctx.fillStyle='rgba(0,0,0,.4)'; rr(W-200,64,180,54,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='14px Trebuchet MS'; ctx.textAlign='left';
    ctx.fillText('Birilli: '+this.score, W-188, 84);
    ctx.fillText('Tiro: '+(this.rolls+1)+'/2', W-188, 104);
    ctx.textAlign='center'; ctx.fillStyle='#ffd86b'; ctx.font='bold 15px Trebuchet MS';
    if(this.phase==='aim') ctx.fillText('SPAZIO per fissare la direzione', W/2, H-14);
    else if(this.phase==='power'){ ctx.fillText('SPAZIO per tirare! Potenza: '+Math.floor(this.pw||0)+'%', W/2, H-14);
      ctx.fillStyle='#0c0'; ctx.fillRect(W/2-100,H-40,(this.pw||0),10); ctx.strokeStyle='#fff'; ctx.strokeRect(W/2-100,H-40,100,10);}
  }
};

/* =====================================================================

const ScuolaScene = {

  newQ(){ const a=Math.floor(rand(1,10)), b=Math.floor(rand(1,10)), op=Math.random()<.5?'+':'×';
    this.a=a; this.b=b; this.op=op; this.ans=op==='+'?a+b:a*b;
    const opts=new Set([this.ans]); while(opts.size<3) opts.add(this.ans+Math.floor(rand(-5,6))||this.ans+1);
    this.opts=[...opts].sort(()=>Math.random()-0.5); },
  update(){

/* =====================================================================
   HELPER per le nuove scene
   ===================================================================== */
const pick = a => a[Math.floor(Math.random()*a.length)];

// puntatore (per il Disegno) convertito in coordinate del canvas
const ptr = { x:0, y:0, down:false };
(function setupPtr(){
  const toC = (cx,cy)=>{ const r=cv.getBoundingClientRect();
    ptr.x=(cx-r.left)/r.width*W; ptr.y=(cy-r.top)/r.height*H; };
  cv.addEventListener('mousedown', e=>{ ptr.down=true; toC(e.clientX,e.clientY); });
  window.addEventListener('mouseup', ()=> ptr.down=false);
  cv.addEventListener('mousemove', e=> toC(e.clientX,e.clientY));
  cv.addEventListener('touchstart', e=>{ ptr.down=true; const t=e.touches[0]; toC(t.clientX,t.clientY); }, {passive:true});
  cv.addEventListener('touchmove', e=>{ const t=e.touches[0]; toC(t.clientX,t.clientY); }, {passive:true});
  window.addEventListener('touchend', ()=> ptr.down=false);
})();

// Factory per i giochi "muoviti e raccogli"
function makeCollect(opts){
  return {
    enter(){ this.t=0; this.x=W/2; this.y=H-110; this.items=[]; this.got=0; this.spawn=0; },
    update(){
      this.t++;
      if (escToHub()) return;
      const sp=4.2;
      if (keys['ArrowLeft']) this.x-=sp;
      if (keys['ArrowRight']) this.x+=sp;
      if (keys['ArrowUp']) this.y-=sp;
      if (keys['ArrowDown']) this.y+=sp;
      this.x=clamp(this.x,24,W-24); this.y=clamp(this.y,130,H-30);

/* SCUOLA GUIDA — guida ed evita gli ostacoli */
const ScuolaGuidaScene = {
  enter(){ this.t=0; this.x=W/2; this.obs=[]; this.dist=0; this.spawn=0; },
  update(){
    this.t++;
    if (escToHub()) return;
    if (keys['ArrowLeft']) this.x-=5;
    if (keys['ArrowRight']) this.x+=5;
    this.x=clamp(this.x,W/2-150,W/2+150);
    this.dist+=0.3;
    if (--this.spawn<=0){ this.spawn=Math.max(24,55-this.dist*0.2);
      this.obs.push({x:rand(W/2-150,W/2+150), y:-40, e:Math.random()<.5?'🚧':'🔺'}); }
    for (const o of this.obs){ o.y+=5+this.dist*0.04;
      if (Math.abs(o.y-(H-90))<34 && Math.abs(o.x-this.x)<34){ o.hit=true; beep(180,0.15); this.dist=Math.max(0,this.dist-10); } }
    this.obs=this.obs.filter(o=>o.y<H+40 && !o.hit);
    if (this.dist>=100){ completeActivity('scuolaguida'); setScene(Hub); }
  },
  draw(){
    sky('#8aa0b0','#b8c4cc');
    ctx.fillStyle='#3a3a42'; ctx.fillRect(W/2-170,0,340,H);
    ctx.strokeStyle='#ffd86b'; ctx.lineWidth=6; ctx.setLineDash([26,26]); ctx.lineDashOffset=-(this.t*8)%52;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
    ctx.font='30px Arial'; ctx.textAlign='center'; for (const o of this.obs) ctx.fillText(o.e,o.x,o.y);
    ctx.fillStyle='#e74c3c'; rr(this.x-20,H-120,40,70,10); ctx.fill();
    ctx.fillStyle='#bde'; rr(this.x-14,H-108,28,20,4); ctx.fill();
    drawPlayer(this.x, H-150, 0.7, 0, 0);
    header('SCUOLA GUIDA','#fff');
    ctx.fillStyle='rgba(0,0,0,.4)'; rr(W/2-120,64,240,30,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 15px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('Guida ed evita gli ostacoli: '+Math.floor(this.dist)+'/100', W/2, 85);
    backHint();
  }
};

/* PESCA — muovi l'amo e pesca i pesci */
const PescaScene = {
  enter(){ this.t=0; this.hx=W/2; this.fish=[]; this.got=0; this.need=6; this.spawn=0; this.msg=''; },
  update(){
    this.t++;
    if (escToHub()) return;
    if (keys['ArrowLeft']) this.hx-=4.5;
    if (keys['ArrowRight']) this.hx+=4.5;
    this.hx=clamp(this.hx,40,W-40);
    if (--this.spawn<=0){ this.spawn=32; const dir=Math.random()<.5?1:-1;
      this.fish.push({x:dir<0?W+30:-30, y:rand(250,H-60), v:dir*rand(1.5,3.2), e:pick(['🐟','🐠','🐡'])}); }
    for (const f of this.fish) f.x+=f.v;
    this.fish=this.fish.filter(f=>f.x>-50 && f.x<W+50);
    if (pressed('Space')){
      let caught=null, bd=42;
      for (const f of this.fish){ const d=Math.hypot(f.x-this.hx, f.y-(H-60)); if (d<bd){ bd=d; caught=f; } }
      if (caught){ this.fish=this.fish.filter(f=>f!==caught); this.got++; beep(800,0.08); this.msg='Preso! 🎣';
        if (this.got>=this.need){ completeActivity('pesca'); setScene(Hub); } }
      else { beep(200,0.1); this.msg='Manca...'; }
    }
  },
  draw(){
    sky('#9be7ff','#cfeffd');
    const g=ctx.createLinearGradient(0,220,0,H); g.addColorStop(0,'#3aa7d8'); g.addColorStop(1,'#0a5a8a');
    ctx.fillStyle=g; ctx.fillRect(0,220,W,H-220);
    ctx.fillStyle='#8a5a30'; ctx.fillRect(this.hx-40,182,80,16);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(this.hx,198); ctx.lineTo(this.hx,H-60); ctx.stroke();
    ctx.fillStyle='#ccc'; ctx.beginPath(); ctx.arc(this.hx,H-58,6,0,7); ctx.fill();
    ctx.font='26px Arial'; ctx.textAlign='center'; for (const f of this.fish) ctx.fillText(f.e,f.x,f.y);
    drawPlayer(this.hx-16,178,0.8,0,0); drawCompanion(this.hx+16,178,0.8,0,0);
    header('PESCA','#fff');
    ctx.fillStyle='rgba(0,0,0,.4)'; rr(W/2-150,64,300,30,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 15px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText('Pesci presi: '+this.got+'/'+this.need+'   '+this.msg, W/2, 85);
    ctx.fillStyle='#ffd86b'; ctx.font='13px Trebuchet MS';
    ctx.fillText("◀ ▶ muovi l'amo  ·  SPAZIO per pescare", W/2, H-30);
    backHint();
  }
};

/* COLOR HOTEL — colora l'hotel col dito/mouse */
const ColorHotelScene = {
  colors:['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#ff7fd0'],
  enter(){ this.t=0; this.ci=0; this.strokes=[]; this.cur=null; this.painted=0; },
  update(){
    this.t++;
    if (escToHub()) return;
    if (pressed('ArrowLeft')) this.ci=(this.ci+this.colors.length-1)%this.colors.length;
    if (pressed('ArrowRight')) this.ci=(this.ci+1)%this.colors.length;
    const inB = ptr.y>120 && ptr.y<H-70 && ptr.x>40 && ptr.x<W-40;
    if (ptr.down && inB){
      if (!this.cur){ this.cur={c:this.colors[this.ci], pts:[]}; this.strokes.push(this.cur); }
      this.cur.pts.push({x:ptr.x, y:ptr.y}); this.painted++;
    } else this.cur=null;
    if (pressed('Space')){
      if (this.painted>20){ completeActivity('colorhotel'); setScene(Hub); }
      else showToast("Colora l'hotel prima! 🎨");
    }
  },
  draw(){
    sky('#e8d6ff','#cdb0f0');
    ctx.fillStyle='#fff'; rr(40,120,W-80,H-190,12); ctx.fill();
    ctx.strokeStyle='#8e44ad'; ctx.lineWidth=4;
    ctx.strokeRect(W/2-160,170,320,260);
    for (let r=0;r<3;r++) for (let c=0;c<5;c++) ctx.strokeRect(W/2-140+c*60,190+r*70,40,45);
    ctx.beginPath(); ctx.moveTo(W/2-180,170); ctx.lineTo(W/2,110); ctx.lineTo(W/2+180,170); ctx.stroke();
    ctx.lineCap='round'; ctx.lineJoin='round';
    for (const s of this.strokes){ ctx.strokeStyle=s.c; ctx.lineWidth=10; ctx.beginPath();
      s.pts.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke(); }
    this.colors.forEach((c,i)=>{ const x=W/2-this.colors.length*20+i*40;
      ctx.fillStyle=c; rr(x,H-56,32,32,6); ctx.fill();
      ctx.lineWidth=this.ci===i?4:1; ctx.strokeStyle=this.ci===i?'#000':'#999'; rr(x,H-56,32,32,6); ctx.stroke(); });
    header('COLOR HOTEL','#5a2a8a');
    ctx.fillStyle='rgba(0,0,0,.45)'; rr(W/2-200,64,400,30,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='13px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText("Colora l'hotel col dito/mouse · ◀ ▶ colore · SPAZIO = fatto", W/2, 85);
    backHint();
  }
};

/* =====================================================================
   LOOP
   ===================================================================== */
function loop(){
  ctx.clearRect(0,0,W,H);
  scene.update();
  scene.draw();
  // toast
  if (toastT>0){ toastT--;
    ctx.globalAlpha = Math.min(1, toastT/40);
    ctx.fillStyle='rgba(0,0,0,.8)'; rr(W/2-180,H/2-26,360,52,12); ctx.fill();
    ctx.fillStyle='#ffd86b'; ctx.font='bold 20px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillText(toast, W/2, H/2+6);
    ctx.globalAlpha=1;
  }
  clearJust();
  requestAnimationFrame(loop);
}

/* responsive: scala il canvas mantenendo le proporzioni */
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function fit(){
  // su touch riempi tutto lo schermo, su desktop lascia un piccolo margine
  const pad = isTouch ? 0 : 24;
  const maxScale = isTouch ? 10 : 1.4;
  const sw = (window.innerWidth-pad)/W, sh=(window.innerHeight-pad)/H;
  const s = Math.min(sw, sh, maxScale);
  cv.style.width = (W*s)+'px';
  cv.style.height = (H*s)+'px';

  // avviso "ruota il telefono" se cellulare in verticale
  const rot = document.getElementById('rotate');
  if (isTouch && window.innerHeight > window.innerWidth){
    rot.style.display = 'flex';
  } else {
    rot.style.display = 'none';
  }
}
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', fit);
fit();

loadGame();      // ripristina i progressi salvati
buildCity(currentCity);   // prepara la mappa della città salvata
setScene(Menu);
loop();
