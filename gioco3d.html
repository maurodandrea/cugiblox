<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Le Avventure dei Cugini · 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0b1020;color:#fff;font-family:'Trebuchet MS','Segoe UI',sans-serif;overflow:hidden;}
  #scene{position:fixed;inset:0;display:block;}
  .screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;z-index:10;background:radial-gradient(120% 120% at 50% 0%,rgba(40,30,80,.55),rgba(8,12,28,.92));}
  .screen.on{display:flex;}
  #s_title{justify-content:space-between;padding:8vh 24px 12vh;
    background:linear-gradient(to bottom,rgba(8,12,28,.78) 0%,rgba(8,12,28,0) 32%,rgba(8,12,28,0) 60%,rgba(8,12,28,.85) 100%);}
  #s_title h1{margin-top:2vh;}
  h1{font-size:min(8vw,46px);letter-spacing:1px;text-shadow:0 4px 18px rgba(0,0,0,.6);}
  h2{font-size:min(6vw,30px);margin-bottom:18px;}
  .sub{color:#ffd86b;margin:6px 0 20px;font-size:min(4.5vw,20px);}
  .grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:760px;}
  .card{width:140px;border-radius:16px;padding:12px 10px;cursor:pointer;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);transition:.15s;}
  .card:hover,.card.sel{background:rgba(255,216,107,.2);border-color:#ffd86b;transform:translateY(-3px);}
  .card .avt{width:104px;height:132px;display:block;margin:0 auto 4px;object-fit:contain;background:radial-gradient(60% 60% at 50% 40%,rgba(255,255,255,.18),rgba(255,255,255,0));border-radius:12px;}
  .card .nm{font-weight:bold;font-size:16px;} .card .ag{font-size:12px;color:#cdd;}
  button.go{margin-top:24px;padding:14px 34px;font-size:20px;font-weight:bold;border:none;border-radius:30px;background:linear-gradient(#ffd86b,#ffb43c);color:#3a2400;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  button.go:active{transform:scale(.96);}
  .small{font-size:13px;color:rgba(255,255,255,.6);margin-top:14px;}
  #mapWrap{position:relative;}
  #italy{width:min(78vw,340px);height:auto;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));}
  .land{fill:#3f8f54;stroke:#dff0d8;stroke-width:2;}
  .mk{cursor:pointer;} .mk circle{fill:#ffd86b;stroke:#fff;stroke-width:2.5;transition:.15s;}
  .mk:hover circle,.mk.sel circle{fill:#ff6b6b;r:11;}
  .mk text{fill:#fff;font-size:15px;font-weight:bold;paint-order:stroke;stroke:#0b1020;stroke-width:3px;}
  #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:8;} #hud.on{display:block;}
  #score{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);padding:8px 18px;border-radius:20px;font-weight:bold;font-size:17px;text-align:center;}
  #instr{position:absolute;top:58px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.35);padding:6px 14px;border-radius:14px;font-size:14px;color:#ffe;text-align:center;max-width:90vw;}
  #powerwrap{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);width:240px;height:18px;background:rgba(0,0,0,.5);border-radius:10px;overflow:hidden;display:none;}
  #powerwrap.on{display:block;} #power{height:100%;width:0%;background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c);}
  #msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:min(7vw,34px);font-weight:bold;color:#ffd86b;text-shadow:0 4px 14px #000;text-align:center;display:none;}
  #back{position:absolute;top:12px;right:12px;width:46px;height:46px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:#fff;font-size:20px;pointer-events:auto;}
  #pad{position:fixed;inset:0;z-index:9;display:none;pointer-events:none;} #pad.on{display:block;}
  .tbtn{position:absolute;bottom:26px;width:76px;height:76px;border-radius:18px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:30px;pointer-events:auto;backdrop-filter:blur(3px);}
  .tbtn:active{background:rgba(255,255,255,.4);} #bL{left:24px;} #bR{left:112px;}
  #bA{right:28px;width:96px;height:96px;border-radius:50%;background:rgba(255,180,60,.85);color:#3a2400;font-weight:bold;font-size:17px;}
  #bU,#bD{right:28px;display:none;font-size:26px;background:rgba(255,180,60,.7);color:#3a2400;}
  #bU{bottom:120px;} #bD{bottom:26px;}
  #pad.drive #bA{display:none;} #pad.drive #bU,#pad.drive #bD{display:block;}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#0b1020;z-index:50;text-align:center;padding:30px;}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="s_title" class="screen on">
  <h1>LE AVVENTURE<br>DEI CUGINI</h1>
  <button class="go" id="startBtn">▶ GIOCA</button>
</div>

<div id="s_char" class="screen">
  <h2>Chi gioca?</h2>
  <div id="charGrid" class="grid"></div>
  <button class="go" id="charNext">Avanti ▶</button>
</div>

<div id="s_map" class="screen">
  <h2>Scegli la città</h2>
  <div class="sub">Tocca una città sulla cartina</div>
  <div id="mapWrap">
    <svg id="italy" viewBox="0 0 300 400">
      <path class="land" d="M60,70 C82,54 122,50 152,63 C168,70 172,92 159,112 C177,123 197,142 189,167 C183,187 166,196 169,216 C173,241 200,251 206,276 C209,293 199,306 211,319 C221,331 216,349 205,351 C195,353 189,342 187,330 C168,326 159,306 157,289 C150,266 139,251 137,231 C135,213 144,201 139,186 C119,181 99,166 91,146 C81,121 70,100 60,70 Z"/>
      <g class="mk" data-city="roma"><circle cx="146" cy="198" r="9"/><text x="120" y="192" text-anchor="end">Roma</text></g>
      <g class="mk" data-city="matera"><circle cx="182" cy="252" r="9"/><text x="200" y="248" text-anchor="start">Matera</text></g>

<div id="hud">
  <div id="score">0</div><div id="instr"></div>
  <div id="powerwrap"><div id="power"></div></div>
  <div id="msg"></div><button id="back">✕</button>
</div>

<div id="pad">
  <button class="tbtn" id="bL">◀</button>
  <button class="tbtn" id="bR">▶</button>
  <button class="tbtn" id="bA">AZIONE</button>
  <button class="tbtn" id="bU">▲</button>
  <button class="tbtn" id="bD">▼</button>
</div>

<div id="err"><h2>3D non disponibile</h2><p style="margin-top:12px;color:#bcd">Non è stato possibile caricare la libreria 3D (Three.js).<br>Serve una connessione internet per la versione 3D.</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
if (typeof THREE === 'undefined'){ document.getElementById('err').style.display='flex'; }
else { startApp(); }

function startApp(){
/* ===================== DATI ===================== */
const CHARS = {
  giorgia:{name:'Giorgia',age:10,skin:0xf3cda9,hair:0x7a4a28,style:'long',  shirt:0xf7f7f7,pants:0x4a6fa5},
  babbo:  {name:'Babbo',  age:30,skin:0xe8b894,hair:0x52443a,style:'adult', shirt:0x5a6b85,pants:0x6a8fc0,beard:true},
  letizia:{name:'Letizia',age:12,skin:0xf6d6b8,hair:0xb8895a,style:'long',  shirt:0xff9ec4,pants:0xd56fa0},
  eleonora:{name:'Eleonora',age:10,skin:0xf3cda9,hair:0xc79a5b,style:'medium',shirt:0xb07cd6,pants:0x5b4a8a},
  corrado:{name:'Corrado',age:8, skin:0xf0c9a8,hair:0x8a5a30,style:'curly', shirt:0x4cae58,pants:0x3a6fa0},
  giulio: {name:'Giulio', age:6, skin:0xf0c9a8,hair:0x2a2018,style:'buzz',  shirt:0xffce3a,pants:0x444444},
};
const CHAR_IDS = ['letizia','giorgia','eleonora','corrado','giulio','babbo'];
const CITIES = {
  roma:   {name:'Roma',   sky:0x9fd0ff, ground:0x6fae5a, accent:0xd9a441},
  rossano:{name:'Rossano',sky:0x8fd8ff, ground:0xead7a0, accent:0x37b6c9},
  matera: {name:'Matera', sky:0xf3e3c8, ground:0xc9ad86, accent:0xb5651d},
};
const CITY_GAMES = {
  roma:    ['bowling','scuola','casa','parco','danza','piscina','color_hotel','guida','moto','bici'],
  matera:  ['cavallo','scuola','parco','cinese','bar','casa','parco_avventure','calcio','basket','piscina'],
  rossano: ['mare','piscina','acquapark','pesca','giostre','bar','bici','piazzetta','gavettoni','ristorante'],
};
const META = {
  colosseo:{e:'🏟️',n:'Colosseo'}, scuola:{e:'🏫',n:'Scuola'}, casa:{e:'🏠',n:'Casa'}, parco:{e:'🌳',n:'Parco'},
  danza:{e:'💃',n:'Danza'}, piscina:{e:'🏊',n:'Piscina'}, color_hotel:{e:'🏨',n:'Color Hotel'}, guida:{e:'🚗',n:'Scuola Guida'},
  moto:{e:'🏍️',n:'Moto'}, bici:{e:'🚲',n:'Bici'}, cavallo:{e:'🐴',n:'Cavallo'}, cinese:{e:'🏮',n:'Cinese'},
  bar:{e:'🍹',n:'Bar'}, parco_avventure:{e:'🧗',n:'Parco Avventure'}, calcio:{e:'⚽',n:'Calcio'}, basket:{e:'🏀',n:'Basket'},
  mare:{e:'🏖️',n:'Mare'}, acquapark:{e:'🎢',n:'Acquapark'}, pesca:{e:'🎣',n:'Pesca'}, giostre:{e:'🎠',n:'Giostre'},
  piazzetta:{e:'⛲',n:'Piazzetta'}, gavettoni:{e:'🎈',n:'Gavettoni'}, ristorante:{e:'🍝',n:'Ristorante'}, bowling:{e:'🎳',n:'Bowling'},
};
let hero='giorgia', city='roma', mode='hub';
let total = parseInt(localStorage.getItem('cugini3d_total')||'0',10);
function otherChar(){ return CHAR_IDS.find(i=>i!==hero)||'babbo'; }

/* ===================== INPUT ===================== */
const keys={}, just={};
addEventListener('keydown',e=>{ const k=norm(e.key); if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault(); if(!keys[k])just[k]=true; keys[k]=true; });
addEventListener('keyup',e=>{ keys[norm(e.key)]=false; });
function norm(k){ if(k===' ')return'Space'; if(k==='a'||k==='A')return'ArrowLeft'; if(k==='d'||k==='D')return'ArrowRight'; if(k==='w'||k==='W')return'ArrowUp'; if(k==='s'||k==='S')return'ArrowDown'; return k; }
function hit(k){ return !!just[k]; }
function clearJust(){ for(const k in just) just[k]=false; }
function bindTouch(id,key){ const b=document.getElementById(id);
  const d=e=>{e.preventDefault(); if(!keys[key])just[key]=true; keys[key]=true;}; const u=e=>{e.preventDefault(); keys[key]=false;};
  b.addEventListener('touchstart',d); b.addEventListener('touchend',u); b.addEventListener('mousedown',d); b.addEventListener('mouseup',u); }
bindTouch('bL','ArrowLeft'); bindTouch('bR','ArrowRight'); bindTouch('bA','Space'); bindTouch('bU','ArrowUp'); bindTouch('bD','ArrowDown');
function setPad(drive){ document.getElementById('pad').classList.toggle('drive',!!drive); }
const isTouch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
let AC=null;
function beep(f=440,d=.08,t='square',v=.05){ try{ if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain(); o.type=t;o.frequency.value=f;g.gain.value=v; o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.stop(AC.currentTime+d);}catch(e){} }

/* ===================== THREE ===================== */
const canvas=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,1,0.1,400);
const clock=new THREE.Clock();
const world=new THREE.Group(); scene.add(world);
scene.add(new THREE.AmbientLight(0xffffff,0.66));
const sun=new THREE.DirectionalLight(0xffffff,0.9); sun.position.set(10,22,12); sun.castShadow=true; sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-30;sun.shadow.camera.right=30;sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;sun.shadow.camera.near=1;sun.shadow.camera.far=90; scene.add(sun);
function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();
const M=(c,r=0.85)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:0.04});
function applyTheme(){ const c=CITIES[city]; scene.background=new THREE.Color(c.sky); scene.fog=new THREE.Fog(c.sky,55,180); }
function clearWorld(){ for(let i=world.children.length-1;i>=0;i--){ const o=world.children[i];
  o.traverse(n=>{ if(n.geometry)n.geometry.dispose(); if(n.material){(Array.isArray(n.material)?n.material:[n.material]).forEach(m=>m.dispose());} }); world.remove(o); } }
function addGround2(col){ const g=new THREE.Mesh(new THREE.PlaneGeometry(500,500),M(col,.95)); g.rotation.x=-Math.PI/2; g.receiveShadow=true; world.add(g); return g; }
function B(w,h,d,c,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M(c)); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; world.add(m); return m; }
function rand(a,b){ return a+Math.random()*(b-a); }
let shakeT=0; function shake(){ shakeT=0.3; }

/* ===================== PERSONAGGIO (con viso) ===================== */
function buildCousin(id){
  const cfg=CHARS[id]; const g=new THREE.Group();
  const sk=M(cfg.skin), sh=M(cfg.shirt,.7), pa=M(cfg.pants), ha=M(cfg.hair,.95);
  const legGeo=new THREE.BoxGeometry(.18,.5,.18);
  const l1=new THREE.Mesh(legGeo,pa); l1.position.set(-.11,.25,0); const l2=l1.clone(); l2.position.x=.11;
  const torso=new THREE.Mesh(new THREE.BoxGeometry(.5,.6,.28),sh); torso.position.y=.8;
  const armGeo=new THREE.BoxGeometry(.12,.5,.12);
  const a1=new THREE.Mesh(armGeo,sk); a1.position.set(-.31,.82,0); const a2=a1.clone(); a2.position.x=.31;
  const head=new THREE.Mesh(new THREE.SphereGeometry(.22,18,18),sk); head.position.y=1.28;
  g.add(l1,l2,torso,a1,a2,head);
  // VISO: occhi (bianco+pupilla), sopracciglia, naso, bocca, guance
  const white=M(0xffffff,.4), pup=M(0x2a2118,.3);
  [-1,1].forEach(s=>{ const eW=new THREE.Mesh(new THREE.SphereGeometry(.05,10,10),white); eW.position.set(.075*s,1.32,.2); g.add(eW);
    const eP=new THREE.Mesh(new THREE.SphereGeometry(.026,8,8),pup); eP.position.set(.075*s,1.32,.235); g.add(eP);
    const brow=new THREE.Mesh(new THREE.BoxGeometry(.09,.02,.03),ha); brow.position.set(.075*s,1.39,.205); g.add(brow); });
  const nose=new THREE.Mesh(new THREE.BoxGeometry(.045,.07,.06),M(cfg.skin,.6)); nose.position.set(0,1.265,.225); g.add(nose);
  const mouth=new THREE.Mesh(new THREE.BoxGeometry(.11,.028,.03),M(0xb05050,.5)); mouth.position.set(0,1.18,.215); g.add(mouth);
  [-1,1].forEach(s=>{ const ch=new THREE.Mesh(new THREE.SphereGeometry(.035,8,8),new THREE.MeshStandardMaterial({color:0xff9aa2,transparent:true,opacity:.5,roughness:1})); ch.position.set(.12*s,1.23,.18); g.add(ch); });
  addHair(g,cfg,ha); g.traverse(o=>{ if(o.isMesh){o.castShadow=true;o.receiveShadow=true;} });
  const k=cfg.style==='adult'?1.0:(0.62+(cfg.age-6)*0.03); g.scale.setScalar(k);
  g.userData.legs=[l1,l2]; g.userData.arms=[a1,a2]; return g;
}
function addHair(g,cfg,ha){ const hy=1.28;
  const cap=(r,f)=>{ const c=new THREE.Mesh(new THREE.SphereGeometry(r,16,16,0,Math.PI*2,0,Math.PI*f),ha); c.position.y=hy+0.02; g.add(c); return c; };
  if(cfg.style==='buzz'){ cap(.225,.55); } else if(cfg.style==='short'){ cap(.24,.6); }
  else if(cfg.style==='adult'){ cap(.24,.58); if(cfg.beard){ const b=new THREE.Mesh(new THREE.BoxGeometry(.34,.16,.26),new THREE.MeshStandardMaterial({color:cfg.hair,transparent:true,opacity:.55,roughness:1})); b.position.set(0,hy-.16,.04); g.add(b);} }
  else if(cfg.style==='medium'){ cap(.25,.72); const bk=new THREE.Mesh(new THREE.BoxGeometry(.42,.32,.18),ha); bk.position.set(0,hy-.14,-.12); g.add(bk); }
  else if(cfg.style==='long'){ cap(.25,.78); const bk=new THREE.Mesh(new THREE.BoxGeometry(.44,.56,.2),ha); bk.position.set(0,hy-.26,-.12); g.add(bk); }
  else if(cfg.style==='curly'){ cap(.22,.55); for(let i=0;i<9;i++){ const b=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),ha); const a=i/9*Math.PI*2; b.position.set(Math.cos(a)*.2,hy+.1,Math.sin(a)*.16); g.add(b); } }
}
function walkAnim(g,phase){ if(!g.userData.legs)return; const s=Math.sin(phase)*0.5;
  g.userData.legs[0].rotation.x=s; g.userData.legs[1].rotation.x=-s; g.userData.arms[0].rotation.x=-s; g.userData.arms[1].rotation.x=s; }
function buildHorse(){ const g=new THREE.Group(); const bm=M(0x8a5a2b,.8), dm=M(0x3a2418,.9);
  const body=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,2),bm); body.position.y=1.2; g.add(body);
  const neck=new THREE.Mesh(new THREE.BoxGeometry(.45,.9,.45),bm); neck.position.set(0,1.8,.9); neck.rotation.x=-0.5; g.add(neck);
  const head=new THREE.Mesh(new THREE.BoxGeometry(.4,.45,.8),bm); head.position.set(0,2.2,1.2); g.add(head);
  const ear1=new THREE.Mesh(new THREE.ConeGeometry(.08,.2,6),bm); ear1.position.set(-.12,2.45,1.0); const ear2=ear1.clone(); ear2.position.x=.12; g.add(ear1,ear2);
  const mane=new THREE.Mesh(new THREE.BoxGeometry(.18,.9,.5),dm); mane.position.set(0,1.95,.75); mane.rotation.x=-0.5; g.add(mane);
  const lg=new THREE.BoxGeometry(.2,1,.2), legs=[];
  [[-.28,.5,.7],[.28,.5,.7],[-.28,.5,-.7],[.28,.5,-.7]].forEach(p=>{const l=new THREE.Mesh(lg,bm);l.position.set(...p);g.add(l);legs.push(l);});
  const tail=new THREE.Mesh(new THREE.BoxGeometry(.16,.8,.16),dm); tail.position.set(0,1.2,-1.1); tail.rotation.x=0.6; g.add(tail);
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); g.userData.hlegs=legs; return g; }
function buildFish(col){ const g=new THREE.Group(); const m=M(col,.5);
  const body=new THREE.Mesh(new THREE.SphereGeometry(.3,14,12),m); body.scale.set(.7,.85,1.55); g.add(body);
  const tail=new THREE.Mesh(new THREE.ConeGeometry(.22,.4,4),m); tail.rotation.x=-Math.PI/2; tail.position.z=-.5; tail.scale.set(1,.45,1.5); g.add(tail);
  const dorsal=new THREE.Mesh(new THREE.ConeGeometry(.13,.28,4),m); dorsal.position.set(0,.26,-.05); dorsal.scale.set(.4,1,1.2); g.add(dorsal);
  [-1,1].forEach(s=>{ const fin=new THREE.Mesh(new THREE.ConeGeometry(.1,.22,4),m); fin.position.set(.18*s,-.02,.05); fin.rotation.z=Math.PI/2*s; g.add(fin);
    const eye=new THREE.Mesh(new THREE.SphereGeometry(.055,8,8),M(0xffffff,.4)); eye.position.set(.13*s,.06,.33); const pup=new THREE.Mesh(new THREE.SphereGeometry(.026,6,6),M(0x111111,.3)); pup.position.set(.15*s,.06,.37); g.add(eye,pup); });
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); return g; }
function thirdPersonWalk(player,dt,speed){ let moved=false;
  if(keys['ArrowLeft']) player.rotation.y+=dt*2.6; if(keys['ArrowRight']) player.rotation.y-=dt*2.6;
  let f=0; if(keys['ArrowUp']||keys['Space'])f=1; if(keys['ArrowDown'])f=-0.6;
  if(f){ const h=player.rotation.y; player.position.x+=Math.sin(h)*speed*f*dt; player.position.z+=Math.cos(h)*speed*f*dt; moved=true; } return moved; }
function followCam(player,dist,height,lookY){ const h=player.rotation.y;
  const cx=player.position.x-Math.sin(h)*dist, cz=player.position.z-Math.cos(h)*dist;
  camera.position.lerp(new THREE.Vector3(cx,height,cz),0.12); camera.lookAt(player.position.x,lookY||1.2,player.position.z); }
function labelSprite(text,w){ const c=document.createElement('canvas'); c.width=300; c.height=96; const x=c.getContext('2d');
  x.fillStyle='rgba(0,0,0,.6)'; x.fillRect(0,0,300,96); x.fillStyle='#ffe7a8'; x.font='bold 34px sans-serif'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(text,150,52);

/* ===================== SCUOLA GUIDA (pista con curve) ===================== */
function DrivingSchool(){
  applyTheme(); addGround2(0x5fa048);
  const wp=[[0,20],[16,15],[20,2],[13,-14],[0,-20],[-15,-13],[-21,2],[-13,15]].map(p=>new THREE.Vector3(p[0],0,p[1]));
  const curve=new THREE.CatmullRomCurve3(wp,true,'catmullrom',0.5);
  const N=170, samples=curve.getPoints(N), W=6;
  for(let i=0;i<samples.length-1;i++){ const a=samples[i],b=samples[i+1]; const mid=a.clone().add(b).multiplyScalar(.5); const len=a.distanceTo(b)+0.5;
    const seg=new THREE.Mesh(new THREE.BoxGeometry(W,0.06,len),M(0x3a3d44,.9)); seg.position.set(mid.x,0.04,mid.z); seg.rotation.y=Math.atan2(b.x-a.x,b.z-a.z); seg.receiveShadow=true; world.add(seg); }
  for(let i=0;i<N;i+=7){ const u=i/N; const p=curve.getPointAt(u), t=curve.getTangentAt(u); const nx=t.z,nz=-t.x;
    [-1,1].forEach(s=>{ const c=new THREE.Mesh(new THREE.ConeGeometry(.25,.7,8),M(0xff7733,.5)); c.position.set(p.x+nx*W/2*s,.35,p.z+nz*W/2*s); c.castShadow=true; world.add(c); }); }
  const NCP=8, cps=[]; for(let i=0;i<NCP;i++){ const u=i/NCP, p=curve.getPointAt(u), t=curve.getTangentAt(u); const nx=t.z,nz=-t.x;
    cps.push(p); const pm=M(i===0?0x2ecc71:0xffd24a,.4); [-1,1].forEach(s=>{ const po=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,2.2,8),pm); po.position.set(p.x+nx*W/2*s,1.1,p.z+nz*W/2*s); po.castShadow=true; world.add(po); }); }
  const car=makeCar(0xe74c3c); car.scale.setScalar(0.8); world.add(car);
  const st=curve.getPointAt(0.02), stT=curve.getTangentAt(0.02); car.position.set(st.x,0,st.z); let h=Math.atan2(stT.x,stT.z); car.rotation.y=h;
  camera.position.set(car.position.x,9,car.position.z+10);
  let s=0, nextCp=1, laps=0, won=false; const LAPS=1;
  setInstr('▲ accelera · ▼ frena/retro · ◀▶ sterza · passa i cancelli in ordine!');
  return { update(dt){ if(won)return;
    if(keys['ArrowUp']||keys['Space']) s=Math.min(15,s+12*dt); else if(keys['ArrowDown']) s=Math.max(-4,s-16*dt); else s*=Math.pow(.45,dt);
    const turn=(keys['ArrowLeft']?1:0)-(keys['ArrowRight']?1:0);
    if(Math.abs(s)>0.3) h+=turn*dt*1.7*Math.sign(s)*Math.min(1,Math.abs(s)/3);
    car.rotation.y=h; car.position.x+=Math.sin(h)*s*dt; car.position.z+=Math.cos(h)*s*dt;

    if(nd>W/2){ s*=Math.pow(.2,dt); }
    if(car.position.distanceTo(cps[nextCp])<W*0.8){ beep(760,.07); nextCp++; if(nextCp>=NCP){ nextCp=0; laps++; beep(1050,.13); if(laps>=LAPS){ won=true; finishGame(25,'Giro completato! 🏁'); return; } } }

  }};
}

  const obs=[]; let dist=0, speed=fence?9:8, vy=0, grounded=true, inv=0, won=false, t=0, spawn=0; const GOAL=240, JUMP=fence?9:8, GRAV=22, CLEAR=fence?1.0:0.9;

    if(!onBoat && inWater && Math.hypot(player.position.x-canotto.position.x,player.position.z-canotto.position.z)<1.4){ onBoat=true; beep(600,.1); }
    if(onBoat){ canotto.position.x=player.position.x; canotto.position.z=player.position.z; canotto.rotation.y=player.rotation.y; player.position.y=.55; if(!inWater){ onBoat=false; } }
    else { player.position.y=inWater?.3:0; }
    if(inWater && !onBoat){ player.userData.arms[0].rotation.x+=dt*5; player.userData.arms[1].rotation.x-=dt*5; }
    else walkAnim(player,moved?t*9:0);
    player.position.x=THREE.MathUtils.clamp(player.position.x,-18,18); player.position.z=THREE.MathUtils.clamp(player.position.z,-26,16);
    followCam(player,9,7,.8);
    for(let i=items.length-1;i>=0;i--){ const it=items[i]; it.rotation.y+=dt*2; if(Math.hypot(player.position.x-it.position.x,player.position.z-it.position.z)<1.3){ collected++; beep(760+collected*40,.08); world.remove(it); items.splice(i,1); } }
    setScore('🏖️ '+collected+'/'+GOAL+(onBoat?'  🛶':inWater?'  🏊':'  👣')+'   ·   ⏱️ '+Math.max(0,Math.ceil(time))+'s');
    if(collected>=GOAL){ done=true; finishGame(15+Math.ceil(Math.max(0,time)),'Giornata al mare super! 🏖️'); }
    else if(time<=0){ done=true; finishGame(5+collected,'Tempo scaduto — '+collected+' raccolti'); }
  }};
}

/* ===================== REGISTRO ===================== */
const GAME_FN={
  guida:DrivingSchool,
  moto:()=>DriveGame({veh:'moto',terrain:'road',goal:750,maxspeed:44}),
  bici:()=>DriveGame({veh:'bici',terrain:'bike',goal:420,maxspeed:24}),
  acquapark:()=>DriveGame({veh:'tube',terrain:'slide',goal:520,maxspeed:32}),
  parco_avventure:ParcoAvventure,
  cavallo:()=>RunnerGame({mode:'fence'}),
  calcio:GameCalcio, basket:GameBasket, piscina:GamePiscina, danza:GameDanza, pesca:GamePesca, giostre:GameGiostre, gavettoni:GameGavettoni, mare:GameMare, bowling:GameBowling,
  casa:()=>walkCollect(THEMES.casa), scuola:()=>walkCollect(THEMES.scuola), parco:()=>walkCollect(THEMES.parco),
  bar:()=>walkCollect(THEMES.bar), ristorante:()=>walkCollect(THEMES.ristorante), cinese:()=>walkCollect(THEMES.cinese),
  color_hotel:()=>walkCollect(THEMES.color_hotel), piazzetta:()=>walkCollect(THEMES.piazzetta), colosseo:()=>walkCollect(THEMES.colosseo),
};

/* ===================== TITOLO ===================== */
let titleActive=false, titleCousins=[], titlePhase=0;
function enterTitle(){ clearWorld(); applyTheme(); addGround2(CITIES.roma.ground); titleActive=true; titlePhase=0; titleCousins=[];
  ['letizia','giorgia','eleonora','corrado','giulio'].forEach((id,i)=>{ const c=buildCousin(id); c.position.set(-6+i*3,0,rand(-1,1)); c.rotation.y=Math.PI/2; world.add(c); c.userData.spd=rand(1.6,2.4); titleCousins.push(c); });
  camera.position.set(0,2.6,11); camera.lookAt(0,1,-1); }

/* ===================== FLOW ===================== */
let activeGame=null, gameOver=false;
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); document.getElementById('hud').classList.remove('on'); document.getElementById('pad').classList.remove('on'); if(id) document.getElementById(id).classList.add('on'); }
function hudOn(){ document.getElementById('hud').classList.add('on'); if(isTouch) document.getElementById('pad').classList.add('on'); }
function enterHub(){ titleActive=false; clearWorld(); showMsg(''); showPower(false); setPad(false); gameOver=false; mode='hub'; activeGame=Hub(); show(null); hudOn(); }
function startGame(gid){ titleActive=false; clearWorld(); showMsg(''); showPower(false); setPad(gid==='guida'); gameOver=false; mode='game'; activeGame=(GAME_FN[gid]||(()=>walkCollect(THEMES.casa)))(); show(null); hudOn(); }
function finishGame(points,text){ if(gameOver)return; gameOver=true;
  points=Math.round(Number(points)); if(!Number.isFinite(points))points=0; if(!Number.isFinite(total))total=0;
  total+=points; localStorage.setItem('cugini3d_total',String(total));
  showMsg(text+'  +'+points+'★'); beep(700,.12); setTimeout(()=>beep(1000,.14),120);
  setTimeout(()=>{ activeGame=null; gameOver=false; enterHub(); },2200); }
document.getElementById('back').addEventListener('click',()=>{ if(mode==='game'){ enterHub(); } else { activeGame=null; clearWorld(); show('s_map'); } });

/* anteprime avatar */
let thumbR=null,thumbScene=null,thumbCam=null; const thumbCache={};
function thumbInit(){ const c=document.createElement('canvas'); c.width=170;c.height=220;
  thumbR=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true,preserveDrawingBuffer:true}); thumbR.setPixelRatio(2); thumbR.setSize(170,220,false);
  thumbScene=new THREE.Scene(); thumbScene.add(new THREE.AmbientLight(0xffffff,.85)); const d=new THREE.DirectionalLight(0xffffff,.7); d.position.set(2,4,3); thumbScene.add(d);
  thumbCam=new THREE.PerspectiveCamera(34,170/220,.1,50); thumbCam.position.set(0,1.05,3.4); thumbCam.lookAt(0,.95,0); }
function avatarThumb(id){ if(thumbCache[id])return thumbCache[id]; if(!thumbR)thumbInit();
  const g=buildCousin(id); thumbScene.add(g); thumbR.render(thumbScene,thumbCam); const url=thumbR.domElement.toDataURL();
  thumbScene.remove(g); g.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());} }); thumbCache[id]=url; return url; }
function buildCharGrid(){ const el=document.getElementById('charGrid'); el.innerHTML='';
  CHAR_IDS.forEach(id=>{ const cfg=CHARS[id]; const d=document.createElement('div'); d.className='card'+(id===hero?' sel':'');
    d.innerHTML='<img class="avt" src="'+avatarThumb(id)+'" alt="'+cfg.name+'"><div class="nm">'+cfg.name+'</div><div class="ag">'+(cfg.age>=18?'adulto':cfg.age+' anni')+'</div>';
    d.onclick=()=>{ hero=id; [...el.children].forEach(c=>c.classList.remove('sel')); d.classList.add('sel'); }; el.appendChild(d); }); }

/* wiring */
document.getElementById('startBtn').onclick=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} titleActive=false; buildCharGrid(); show('s_char'); };
document.getElementById('charNext').onclick=()=>{ document.querySelectorAll('.mk').forEach(m=>m.classList.toggle('sel',m.dataset.city===city)); show('s_map'); };
document.getElementById('mapBack').onclick=()=>{ show('s_char'); };
document.querySelectorAll('.mk').forEach(m=>{ m.addEventListener('click',()=>{ city=m.dataset.city; enterHub(); }); });

/* loop */
function loop(){ const dt=Math.min(0.05,clock.getDelta());
  if(titleActive){ titlePhase+=dt; titleCousins.forEach((c,i)=>{ c.position.x+=c.userData.spd*dt; if(c.position.x>8)c.position.x-=16; walkAnim(c,titlePhase*8+i); }); }
  else if(activeGame)activeGame.update(dt);
  if(shakeT>0){ shakeT-=dt; camera.position.x+=Math.sin(performance.now()*.05)*.06; } clearJust(); renderer.render(scene,camera); requestAnimationFrame(loop); }
enterTitle(); loop();
}
